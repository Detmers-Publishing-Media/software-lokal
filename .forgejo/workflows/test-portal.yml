name: Test Portal
on:
  push:
    branches: [main]
    paths:
      - 'portal/**'
  pull_request:
    paths:
      - 'portal/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Run Portal tests
        run: pnpm test
        working-directory: portal
