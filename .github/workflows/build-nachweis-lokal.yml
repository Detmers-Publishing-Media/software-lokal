name: Test + Build (Nachweis Lokal)

on:
  workflow_dispatch:
  push:
    tags: ['v*']
    branches: [main]
    paths:
      - 'products/nachweis-lokal/**'
      - 'packages/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: sudo apt-get update && sudo apt-get install -y build-essential python3
      - run: pnpm install
      - run: node --test products/nachweis-lokal/tests/test_*.js

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm electron:build
        working-directory: products/nachweis-lokal
      - uses: actions/upload-artifact@v4
        with:
          name: nachweis-lokal-linux
          path: products/nachweis-lokal/release/*.AppImage

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm electron:build
        working-directory: products/nachweis-lokal
      - uses: actions/upload-artifact@v4
        with:
          name: nachweis-lokal-macos
          path: |
            products/nachweis-lokal/release/*.dmg
            products/nachweis-lokal/release/*.zip
            !products/nachweis-lokal/release/*.blockmap

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm electron:build
        working-directory: products/nachweis-lokal
      - uses: actions/upload-artifact@v4
        with:
          name: nachweis-lokal-windows
          path: products/nachweis-lokal/release/*.exe

  publish-to-portal:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Version ermitteln
        id: version
        run: |
          VERSION=$(node -p "require('./products/nachweis-lokal/package.json').version")
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Product version: v${VERSION}"

      - name: Linux-Artefakt herunterladen
        uses: actions/download-artifact@v4
        with:
          name: nachweis-lokal-linux
          path: artifacts/linux

      - name: macOS-Artefakt herunterladen
        uses: actions/download-artifact@v4
        with:
          name: nachweis-lokal-macos
          path: artifacts/macos

      - name: Windows-Artefakt herunterladen
        uses: actions/download-artifact@v4
        with:
          name: nachweis-lokal-windows
          path: artifacts/windows

      - name: SSH-Key einrichten
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PORTAL_DEPLOY_KEY }}" > ~/.ssh/portal_deploy
          chmod 600 ~/.ssh/portal_deploy
          ssh-keyscan -H "${{ secrets.PORTAL_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Artefakte per SCP zum Portal hochladen
        env:
          PORTAL_HOST: ${{ secrets.PORTAL_HOST }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          SSH_OPTS="-i ~/.ssh/portal_deploy -o StrictHostKeyChecking=accept-new"
          REMOTE_BASE="/mnt/downloads/nachweis-lokal/${VERSION}"

          upload_file() {
            local platform="$1"
            local file="$2"
            local filename=$(basename "$file")
            local remote_dir="${REMOTE_BASE}/${platform}"
            echo "Uploading $filename to $platform..."
            ssh $SSH_OPTS "root@${PORTAL_HOST}" "mkdir -p ${remote_dir} && rm -f ${remote_dir}/*"
            scp $SSH_OPTS "$file" "root@${PORTAL_HOST}:${remote_dir}/${filename}"
            echo "  OK: $filename"
          }

          for f in artifacts/linux/*.AppImage; do
            [ -f "$f" ] && upload_file "linux" "$f"
          done

          for f in artifacts/macos/*.zip artifacts/macos/*.dmg; do
            [ -f "$f" ] && upload_file "macos" "$f"
          done

          for f in artifacts/windows/*.exe; do
            [ -f "$f" ] && upload_file "windows" "$f"
          done

          echo "Alle Artefakte zum Portal hochgeladen."

      - name: SSH-Key aufraeumen
        if: always()
        run: rm -f ~/.ssh/portal_deploy
