name: Electron Build (Reusable)

on:
  workflow_call:
    inputs:
      product_dir:
        description: 'Product directory (e.g. products/rechnung-lokal)'
        required: true
        type: string
      artifact_prefix:
        description: 'Artifact name prefix (e.g. rechnung-lokal)'
        required: true
        type: string
      test_packages:
        description: 'Space-separated package test dirs (e.g. packages/finanz-shared)'
        required: false
        type: string
        default: ''
    secrets:
      PORTAL_DEPLOY_KEY:
        required: false
      PORTAL_HOST:
        required: false

permissions:
  contents: write

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install dependencies
        run: pnpm install

      - name: Run package tests
        if: inputs.test_packages != ''
        run: |
          for pkg in ${{ inputs.test_packages }}; do
            echo "Testing $pkg..."
            node --test "$pkg/tests/test_*.js"
          done

      - name: Run product tests
        run: pnpm test
        working-directory: ${{ inputs.product_dir }}

  build-windows:
    needs: test-linux
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Build Electron App
        run: pnpm electron:build
        working-directory: ${{ inputs.product_dir }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-windows
          path: ${{ inputs.product_dir }}/release/*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ inputs.product_dir }}/release/*.exe
          generate_release_notes: true

  build-linux:
    needs: test-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install dependencies
        run: pnpm install

      - name: Build Electron App
        run: pnpm electron:build
        working-directory: ${{ inputs.product_dir }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-linux
          path: ${{ inputs.product_dir }}/release/*.AppImage

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ inputs.product_dir }}/release/*.AppImage
          generate_release_notes: true

  build-macos:
    needs: test-linux
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Build Electron App
        run: pnpm electron:build
        working-directory: ${{ inputs.product_dir }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-macos
          path: |
            ${{ inputs.product_dir }}/release/*.dmg
            ${{ inputs.product_dir }}/release/*.zip
            !${{ inputs.product_dir }}/release/*.blockmap

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ inputs.product_dir }}/release/*.dmg
            ${{ inputs.product_dir }}/release/*.zip
          generate_release_notes: true

  publish-to-portal:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (fuer Version)
        uses: actions/checkout@v4

      - name: Version ermitteln
        id: version
        run: |
          VERSION=$(node -p "require('./${{ inputs.product_dir }}/package.json').version")
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Product version: v${VERSION}"

      - name: Linux-Artefakt herunterladen
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-linux
          path: artifacts/linux

      - name: macOS-Artefakt herunterladen
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-macos
          path: artifacts/macos

      - name: Windows-Artefakt herunterladen
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-windows
          path: artifacts/windows

      - name: SSH-Key einrichten
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PORTAL_DEPLOY_KEY }}" > ~/.ssh/portal_deploy
          chmod 600 ~/.ssh/portal_deploy
          ssh-keyscan -H "${{ secrets.PORTAL_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Artefakte per SCP zum Portal hochladen
        env:
          PORTAL_HOST: ${{ secrets.PORTAL_HOST }}
          PRODUCT_ID: ${{ inputs.artifact_prefix }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          SSH_OPTS="-i ~/.ssh/portal_deploy -o StrictHostKeyChecking=accept-new"
          REMOTE_BASE="/mnt/downloads/${PRODUCT_ID}/${VERSION}"

          upload_file() {
            local platform="$1"
            local file="$2"
            local filename=$(basename "$file")
            local remote_dir="${REMOTE_BASE}/${platform}"
            echo "Uploading $filename to $platform..."
            ssh $SSH_OPTS "root@${PORTAL_HOST}" "mkdir -p ${remote_dir} && rm -f ${remote_dir}/*"
            scp $SSH_OPTS "$file" "root@${PORTAL_HOST}:${remote_dir}/${filename}"
            echo "  OK: $filename"
          }

          # Linux
          for f in artifacts/linux/*.AppImage; do
            [ -f "$f" ] && upload_file "linux" "$f"
          done

          # macOS
          for f in artifacts/macos/*.zip artifacts/macos/*.dmg; do
            [ -f "$f" ] && upload_file "macos" "$f"
          done

          # Windows
          for f in artifacts/windows/*.exe; do
            [ -f "$f" ] && upload_file "windows" "$f"
          done

          echo "Alle Artefakte per SCP zum Portal hochgeladen."

      - name: SSH-Key aufraeumen
        if: always()
        run: rm -f ~/.ssh/portal_deploy
