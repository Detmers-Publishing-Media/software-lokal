schema_version: 1
product_id: "mitglieder-lokal"
name: "Mitglieder lokal"
tagline: "Mitgliederverwaltung fuer Vereine — einfach, offline, DSGVO-konform"
version: "0.5.0"
license: "GPL-3.0-only"
type: "app"
tech_stack: "electron-svelte"
bundles: ["B-05-verein-ehrenamt"]
platforms: ["linux", "windows", "macos"]

description:
  short: "Desktop-App zur Verwaltung von Vereinsmitgliedern"
  long: |
    Mitglieder lokal verwaltet Mitgliederdaten, Beitraege und
    Kontaktinformationen lokal auf Ihrem Rechner.
    Keine Cloud, keine monatlichen Kosten, DSGVO-konform.
  benefits:
    - "Alle Daten lokal — keine Cloud"
    - "CSV Import/Export (Excel-Migration)"
    - "Beitragsverwaltung mit flexiblen Intervallen"
    - "PDF-Listen: Mitglieder, Telefon, Geburtstag, Jubilare, Mahnliste"
    - "Mahnbriefe in 3 Stufen als PDF"
    - "DSGVO-Einwilligungen erfassen und filtern"
    - "Laeuft auf Windows und Linux"
  target_audience: "Foerdervereine, Kulturvereine, Sportvereine"

pricing:
  model: "support-abo"
  price_cents: 2900
  interval: "jaehrlich"
  includes:
    - "Fertige Installer (Windows, Linux)"
    - "Automatische Update-Benachrichtigung"
    - "Support-Ticket-System (Antwort in 48h)"
    - "Feature-Request mit Voting-Recht"
    - "Zugang zum Download-Portal"

features:
  - id: "mitglieder-crud"
    name: "Mitglieder verwalten"
    description: "Anlegen, bearbeiten, suchen und loeschen von Vereinsmitgliedern"
    status: "done"
    since: "0.1.0"
  - id: "member-number"
    name: "Automatische Mitgliedsnummer"
    description: "Fortlaufende Mitgliedsnummer wird automatisch vergeben"
    status: "done"
    since: "0.1.0"
  - id: "fee-classes"
    name: "Beitragsklassen"
    description: "Flexible Beitragsklassen mit Intervallen (monatlich bis jaehrlich)"
    status: "done"
    since: "0.2.0"
  - id: "csv-export"
    name: "CSV-Export"
    description: "Mitgliederliste als CSV exportieren"
    status: "done"
    since: "0.1.0"
  - id: "csv-import"
    name: "CSV-Import"
    description: "Mitgliederlisten aus Excel/CSV importieren"
    status: "done"
    since: "0.2.0"
  - id: "pdf-mitgliederliste"
    name: "PDF Mitgliederliste"
    description: "Druckfertige Mitgliederliste mit Vereinskopf"
    status: "done"
    since: "0.3.0"
  - id: "pdf-telefonliste"
    name: "PDF Telefonliste"
    description: "Telefonliste nur fuer Mitglieder mit Einwilligung"
    status: "done"
    since: "0.3.0"
  - id: "pdf-geburtstagsliste"
    name: "PDF Geburtstagsliste"
    description: "Geburtstage aller Mitglieder nach Monat sortiert"
    status: "done"
    since: "0.3.0"
  - id: "pdf-jubilare"
    name: "PDF Jubilare"
    description: "Mitglieder mit Vereinsjubilaeum im aktuellen Jahr"
    status: "done"
    since: "0.3.0"
  - id: "pdf-beitragsuebersicht"
    name: "PDF Beitragsuebersicht"
    description: "Jahresuebersicht aller Beitraege (Soll/Ist)"
    status: "done"
    since: "0.4.0"
  - id: "payments"
    name: "Beitragsverwaltung"
    description: "Zahlungen erfassen (Bar/Ueberweisung), Jahresuebersicht, offene Beitraege"
    status: "done"
    since: "0.4.0"
  - id: "mahnbriefe"
    name: "Mahnbriefe"
    description: "3-stufige Mahnbriefe als PDF mit Vereinskopf"
    status: "done"
    since: "0.4.0"
  - id: "dsgvo-consent"
    name: "DSGVO-Einwilligungen"
    description: "Einwilligungen fuer Telefon, E-Mail, Foto (intern/oeffentlich) erfassen und filtern"
    status: "done"
    since: "0.2.0"
  - id: "club-profile"
    name: "Vereinsprofil"
    description: "Vereinsdaten, Briefkopf, IBAN, Freistellungsbescheid hinterlegen"
    status: "done"
    since: "0.3.0"
  - id: "event-log"
    name: "Event-Log"
    description: "Lueckenloses Aenderungsprotokoll mit HMAC-SHA256 Hash-Kette"
    status: "done"
    since: "0.3.0"
  - id: "support-integration"
    name: "Support-Integration"
    description: "Supportvertrag verwalten, Tickets einreichen, Diagnose-Bundle senden"
    status: "done"
    since: "0.5.0"
  - id: "license-section"
    name: "Lizenz-Verwaltung"
    description: "Support-Key eingeben, Status pruefen, entfernen"
    status: "done"
    since: "0.5.0"
  - id: "backup"
    name: "Automatisches Backup"
    description: "Lokales Backup bei App-Start (taeglich, woechentlich, monatlich)"
    status: "done"
    since: "0.5.0"
  - id: "spendenquittung"
    name: "Spendenquittungen"
    description: "Einzel- und Jahres-Sammelquittung nach amtlichem Muster"
    status: "planned"
  - id: "teilnahmeliste"
    name: "Teilnahmeliste Hauptversammlung"
    description: "Anwesenheitsliste mit Quorum-Pruefung"
    status: "planned"
  - id: "dsgvo-auskunft"
    name: "DSGVO-Datenauskunft (Art. 15)"
    description: "PDF/JSON-Export aller Daten eines Mitglieds"
    status: "planned"
  - id: "dsgvo-loeschung"
    name: "DSGVO-Loeschung (Art. 17)"
    description: "Mitglied loeschen mit Anonymisierung der Finanzdaten"
    status: "planned"
  - id: "dsgvo-faellige"
    name: "Faellige Loeschungen"
    description: "Dashboard-Widget zeigt abgelaufene Aufbewahrungsfristen"
    status: "planned"

faq:
  - question: "Brauche ich den Support-Key, um die Software zu nutzen?"
    answer: "Nein. Die Software ist Open Source (GPL 3.0) und funktioniert komplett ohne Key. Der Key gibt Ihnen Zugang zu fertigen Installern, Updates und Support."
  - question: "Wo werden meine Daten gespeichert?"
    answer: "Lokal auf Ihrem Computer in einer SQLite-Datenbank. Keine Cloud."
  - question: "Auf welchen Betriebssystemen laeuft die App?"
    answer: "Windows 10+ und Linux (Ubuntu 22.04+)."

installation:
  prerequisites:
    - "Windows 10+ oder Linux (Ubuntu 22.04+)"
    - "100 MB freier Festplattenspeicher"
  steps:
    - "Laden Sie die aktuelle Version herunter"
    - "Fuehren Sie die Installationsdatei aus"
    - "Starten Sie die Anwendung — keine Konfiguration noetig"
  notes: "Die App speichert Daten im Home-Verzeichnis."

architecture:
  frontend: "Svelte 5 SPA in Electron Renderer"
  backend: "Electron Main Process (@codefabrik/electron-platform)"
  database: "SQLite via better-sqlite3 (Electron IPC)"
  shared_lib: "@codefabrik/app-shared"
