trigger:
  tags:
    include: ['v*']

pool:
  vmImage: 'windows-latest'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '22.x'

  - script: npm install -g pnpm
    displayName: 'pnpm installieren'

  - script: pnpm install
    displayName: 'Frontend-Abhaengigkeiten installieren'
    workingDirectory: '$(Build.SourcesDirectory)'

  - script: |
      curl --proto '=https' --tlsv1.2 -sSf https://win.rustup.rs/x86_64 -o rustup-init.exe
      rustup-init.exe -y --default-toolchain stable
    displayName: 'Rust installieren'

  - script: |
      set PATH=%USERPROFILE%\.cargo\bin;%PATH%
      cargo install tauri-cli
    displayName: 'Tauri CLI installieren'

  - script: |
      set PATH=%USERPROFILE%\.cargo\bin;%PATH%
      cargo tauri build
    displayName: 'Tauri Windows Build'
    workingDirectory: '$(Build.SourcesDirectory)'

  - task: PublishBuildArtifacts@1
    inputs:
      pathtoPublish: 'src-tauri/target/release/bundle'
      artifactName: 'windows-installer'
    displayName: 'Build-Artefakte veroeffentlichen'

  - powershell: tests/windows/smoke-test.ps1
    displayName: 'Installer Smoke Tests'
    workingDirectory: '$(Build.SourcesDirectory)'

  - task: PublishBuildArtifacts@1
    inputs:
      pathtoPublish: 'test-results'
      artifactName: 'test-report'
    displayName: 'Test-Report veroeffentlichen'

  - bash: |
      TAG="$(Build.SourceBranchName)"
      # Forgejo Release erstellen
      RELEASE=$(curl -sf -X POST \
        "$(FORGEJO_URL)/api/v1/repos/$(FORGEJO_ORG)/$(FORGEJO_REPO)/releases" \
        -H "Authorization: token $(FORGEJO_API_TOKEN)" \
        -H "Content-Type: application/json" \
        -d "{\"tag_name\":\"${TAG}\",\"name\":\"MitgliederSimple ${TAG}\",\"body\":\"Windows-Installer\"}")
      RELEASE_ID=$(echo "$RELEASE" | jq -r '.id')
      # EXE/MSI hochladen
      for file in src-tauri/target/release/bundle/nsis/*.exe; do
        filename=$(basename "$file")
        curl -sf -X POST \
          "$(FORGEJO_URL)/api/v1/repos/$(FORGEJO_ORG)/$(FORGEJO_REPO)/releases/${RELEASE_ID}/assets?name=${filename}" \
          -H "Authorization: token $(FORGEJO_API_TOKEN)" \
          -H "Content-Type: application/octet-stream" \
          --data-binary "@${file}"
      done
      echo "Release ${TAG} erstellt mit Assets"
    displayName: 'Upload zu Forgejo Release'
    condition: startsWith(variables['Build.SourceBranch'], 'refs/tags/v')
    workingDirectory: '$(Build.SourcesDirectory)'
