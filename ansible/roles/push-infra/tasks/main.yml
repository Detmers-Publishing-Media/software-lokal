---
- name: "infra-local Repo erstellen"
  ansible.builtin.uri:
    url: "http://localhost:3000/api/v1/orgs/{{ factory_org }}/repos"
    method: POST
    headers:
      Authorization: "token {{ forgejo_api_token }}"
    body_format: json
    body:
      name: infra-local
      private: true
      auto_init: false
    status_code: [201, 409]

- name: "Ansible-Dateien auf Server kopieren"
  ansible.builtin.copy:
    src: /ansible/
    dest: /tmp/infra-push/
    mode: preserve

- name: "Paket-Dateien nach Forgejo pushen"
  ansible.builtin.shell: |
    set -euo pipefail
    TMPDIR="/tmp/infra-push"

    # Vault NICHT einchecken
    rm -f "$TMPDIR/inventory/group_vars/all/vault.yml"

    cd "$TMPDIR"
    git init -b main
    git config user.name "Factory Ansible"
    git config user.email "ansible@factory.local"
    git add -A
    git commit -m "Infra-Stand nach Installation v{{ factory_version }}"
    git remote add origin \
      "http://factory-admin:{{ forgejo_admin_password }}@localhost:3000/{{ factory_org }}/infra-local.git"
    git push -u origin main --force

    rm -rf "$TMPDIR"
  args:
    executable: /bin/bash
