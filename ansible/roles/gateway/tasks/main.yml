---
- name: "Gateway-Verzeichnis erstellen"
  ansible.builtin.file:
    path: "{{ docker_compose_dir }}/gateway"
    state: directory
    mode: '0755'

- name: "Gateway package.json erstellen"
  ansible.builtin.copy:
    content: |
      { "name": "factory-gateway", "private": true, "dependencies": { "pg": "^8" } }
    dest: "{{ docker_compose_dir }}/gateway/package.json"

- name: "Gateway server.js erstellen"
  ansible.builtin.copy:
    content: |
      const http = require('http');
      const { Client } = require('pg');
      const start = Date.now();

      const server = http.createServer(async (req, res) => {
        res.setHeader('Content-Type', 'application/json');

        if (req.url === '/health') {
          res.writeHead(200);
          res.end(JSON.stringify({
            status: 'ok',
            version: '{{ factory_version }}',
            uptime: Math.floor((Date.now() - start) / 1000)
          }));
        } else if (req.url === '/ready') {
          const client = new Client({
            host: 'postgres',
            port: 5432,
            database: 'forgejo',
            user: 'forgejo',
            password: process.env.POSTGRES_PASSWORD,
            connectionTimeoutMillis: 5000
          });
          try {
            await client.connect();
            const { rows } = await client.query(
              "SELECT mode, traffic_enabled FROM runtime_control WHERE env_name = $1",
              ['prod']
            );
            await client.end();
            const row = rows[0];
            if (row && row.mode === 'LIVE' && row.traffic_enabled === true) {
              res.writeHead(200);
              res.end(JSON.stringify({ ready: true, mode: row.mode, env: 'prod' }));
            } else {
              res.writeHead(503);
              res.end(JSON.stringify({ ready: false, mode: row?.mode, reason: 'Not LIVE' }));
            }
          } catch (e) {
            try { await client.end(); } catch (_) {}
            res.writeHead(503);
            res.end(JSON.stringify({ ready: false, reason: e.message }));
          }
        } else if (req.url === '/metrics') {
          const client = new Client({
            host: 'postgres',
            port: 5432,
            database: 'forgejo',
            user: 'forgejo',
            password: process.env.POSTGRES_PASSWORD,
            connectionTimeoutMillis: 5000
          });
          try {
            await client.connect();
            const { rows } = await client.query(`
              SELECT
                COUNT(*) FILTER (WHERE pr_created_at IS NOT NULL AND blocked_at IS NULL) as completed,
                COUNT(*) FILTER (WHERE blocked_at IS NOT NULL) as blocked,
                COUNT(*) FILTER (WHERE pr_created_at IS NULL AND blocked_at IS NULL) as in_progress,
                ROUND(AVG(total_duration_minutes) FILTER (WHERE total_duration_minutes IS NOT NULL)) as avg_duration_min,
                ROUND(AVG(dev_duration_minutes) FILTER (WHERE dev_duration_minutes IS NOT NULL)) as avg_dev_min,
                MAX(pr_created_at) as last_pr,
                ROUND(AVG(review_iterations) FILTER (WHERE review_iterations > 0)) as avg_review_iterations,
                COUNT(*) FILTER (WHERE review_verdict = 'approved') as review_approved,
                COUNT(*) FILTER (WHERE review_verdict LIKE '%fix%') as review_had_fixes,
                COUNT(*) FILTER (WHERE review_verdict = 'force-approved') as review_force_approved
              FROM pipeline_metrics
            `);
            await client.end();
            res.writeHead(200);
            res.end(JSON.stringify({
              pipeline: rows[0],
              version: '{{ factory_version }}',
              timestamp: new Date().toISOString()
            }));
          } catch (e) {
            try { await client.end(); } catch (_) {}
            res.writeHead(500);
            res.end(JSON.stringify({ error: 'metrics unavailable', reason: e.message }));
          }
        } else {
          res.writeHead(404);
          res.end(JSON.stringify({ error: 'not found' }));
        }
      });

      server.listen(3100, '0.0.0.0', () => {
        console.log('Factory Gateway v{{ factory_version }} on :3100');
      });
    dest: "{{ docker_compose_dir }}/gateway/server.js"

- name: "Gateway Dockerfile erstellen"
  ansible.builtin.copy:
    content: |
      FROM node:22-slim
      WORKDIR /app
      COPY package.json .
      RUN npm install --omit=dev
      COPY server.js .
      CMD ["node", "server.js"]
    dest: "{{ docker_compose_dir }}/gateway/Dockerfile"
