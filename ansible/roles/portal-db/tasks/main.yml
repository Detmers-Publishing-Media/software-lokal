---
- name: "Warte auf PostgreSQL"
  ansible.builtin.shell: docker exec portal-db pg_isready -U portal
  register: pg_ready
  retries: 30
  delay: 5
  until: pg_ready.rc == 0
  changed_when: false

- name: "init.sql in Container kopieren"
  ansible.builtin.shell: docker cp {{ portal_docker_compose_dir }}/src/db/init.sql portal-db:/tmp/init.sql

- name: "Datenbank initialisieren"
  ansible.builtin.shell: docker exec portal-db psql -U portal -d portal -f /tmp/init.sql
  register: db_init_result

- name: "DB-Init Ergebnis"
  ansible.builtin.debug:
    msg: "{{ db_init_result.stdout_lines[-5:] }}"

- name: "Migrations-Dateien finden"
  ansible.builtin.find:
    paths: "{{ portal_docker_compose_dir }}/src/db"
    patterns: "migrate-v*.sql"
  register: migration_files

- name: "Migrationen sortiert in Container kopieren und ausfuehren"
  ansible.builtin.shell: |
    docker cp {{ item.path }} portal-db:/tmp/{{ item.path | basename }}
    docker exec portal-db psql -U portal -d portal -f /tmp/{{ item.path | basename }} 2>&1
  loop: "{{ migration_files.files | sort(attribute='path') }}"
  loop_control:
    label: "{{ item.path | basename }}"
  register: migration_results

- name: "Migrations-Ergebnisse"
  ansible.builtin.debug:
    msg: "{{ item.item.path | basename }}: {{ item.stdout_lines[-3:] | default(['OK']) }}"
  loop: "{{ migration_results.results }}"
  loop_control:
    label: "{{ item.item.path | basename }}"

- name: "Schema-Validierung: Pflicht-Spalten pruefen"
  ansible.builtin.shell: |
    docker exec portal-db psql -U portal -d portal -tAq -c "
    SELECT COUNT(*) FROM information_schema.columns
    WHERE table_name = 'licenses' AND column_name IN ('license_hash', 'auto_renew', 'last_validated_at', 'note')
    "
  register: schema_check
  failed_when: (schema_check.stdout | trim | int) < 4

- name: "Schema-Validierung Ergebnis"
  ansible.builtin.debug:
    msg: "Schema OK: {{ schema_check.stdout | trim }} von 4 Pflicht-Spalten in licenses vorhanden"

- name: "PROD-Server-Info in prod_status speichern"
  ansible.builtin.shell: |
    docker exec portal-db psql -U portal -d portal -c "
    UPDATE prod_status SET
      server_uuid = '{{ prod_server_uuid }}',
      server_ip = '{{ prod_server_ip }}',
      updated_at = NOW()
    WHERE id = 1;"
  when: prod_server_uuid is defined and prod_server_uuid | length > 0
