---
- name: "Portal-Server {{ portal_server.uuid }} Status pruefen"
  ansible.builtin.uri:
    url: "https://api.upcloud.com/1.3/server/{{ portal_server.uuid }}"
    method: GET
    headers:
      Authorization: "Bearer {{ vault_upcloud_api_token }}"
    status_code: [200]
  register: portal_status

- name: "Portal-Server {{ portal_server.uuid }} stoppen"
  ansible.builtin.uri:
    url: "https://api.upcloud.com/1.3/server/{{ portal_server.uuid }}/stop"
    method: POST
    headers:
      Authorization: "Bearer {{ vault_upcloud_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      stop_server:
        stop_type: hard
        timeout: 60
    status_code: [200, 409]
  when: portal_status.json.server.state != 'stopped'
  ignore_errors: true

- name: "Warte bis Server gestoppt ist (max 60s)"
  ansible.builtin.uri:
    url: "https://api.upcloud.com/1.3/server/{{ portal_server.uuid }}"
    method: GET
    headers:
      Authorization: "Bearer {{ vault_upcloud_api_token }}"
    status_code: [200]
  register: stop_check
  until: stop_check.json.server.state == 'stopped'
  retries: 12
  delay: 5

- name: "Portal-Server {{ portal_server.uuid }} loeschen"
  ansible.builtin.uri:
    url: "https://api.upcloud.com/1.3/server/{{ portal_server.uuid }}/?storages=1&backups=delete"
    method: DELETE
    headers:
      Authorization: "Bearer {{ vault_upcloud_api_token }}"
      Content-Type: "application/json"
    status_code: [200, 204]
  register: delete_result

- name: "Loeschung bestaetigen"
  ansible.builtin.debug:
    msg: "Portal-Server {{ portal_server.uuid }} geloescht (Status: {{ delete_result.status }})"
