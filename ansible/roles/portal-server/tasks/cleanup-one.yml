---
- name: "Portal-Server {{ portal_server.uuid }} stoppen"
  ansible.builtin.uri:
    url: "https://api.upcloud.com/1.3/server/{{ portal_server.uuid }}/stop"
    method: POST
    headers:
      Authorization: "Bearer {{ vault_upcloud_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      stop_server:
        stop_type: hard
        timeout: 60
    status_code: [200, 409]
  ignore_errors: true

- name: "Warte auf Stop (15s)"
  ansible.builtin.pause:
    seconds: 15

- name: "Portal-Server {{ portal_server.uuid }} loeschen"
  ansible.builtin.uri:
    url: "https://api.upcloud.com/1.3/server/{{ portal_server.uuid }}/?storages=1&backups=delete"
    method: DELETE
    headers:
      Authorization: "Bearer {{ vault_upcloud_api_token }}"
      Content-Type: "application/json"
    status_code: [200, 204]
  ignore_errors: true
