---
- name: "Portal-Server via UpCloud API erstellen"
  delegate_to: localhost
  block:
    # --- Persistentes Downloads-Storage suchen oder erstellen ---
    - name: "Bestehendes Downloads-Storage suchen"
      ansible.builtin.uri:
        url: "https://api.upcloud.com/1.3/storage/private"
        method: GET
        headers:
          Authorization: "Bearer {{ vault_upcloud_api_token }}"
        status_code: [200]
      register: storage_list

    - name: "Downloads-Storage UUID ermitteln (falls vorhanden)"
      ansible.builtin.set_fact:
        downloads_storage_uuid: "{{ storage_list.json.storages.storage | selectattr('title', 'eq', portal_downloads_storage_title) | map(attribute='uuid') | first | default('') }}"

    - name: "Downloads-Storage existiert bereits"
      ansible.builtin.debug:
        msg: "Bestehendes Storage gefunden: {{ downloads_storage_uuid }}"
      when: downloads_storage_uuid | length > 0

    - name: "Downloads-Storage erstellen (erstmalig)"
      ansible.builtin.uri:
        url: "https://api.upcloud.com/1.3/storage"
        method: POST
        headers:
          Authorization: "Bearer {{ vault_upcloud_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          storage:
            zone: "{{ upcloud_zone }}"
            title: "{{ portal_downloads_storage_title }}"
            size: "{{ portal_downloads_storage_size }}"
            tier: "{{ upcloud_storage_tier }}"
        status_code: [200, 201]
      register: new_storage_result
      when: downloads_storage_uuid | length == 0

    - name: "Neue Storage UUID setzen"
      ansible.builtin.set_fact:
        downloads_storage_uuid: "{{ new_storage_result.json.storage.uuid }}"
      when: downloads_storage_uuid | length == 0

    - name: "Downloads-Storage UUID speichern"
      ansible.builtin.debug:
        msg: "Downloads-Storage UUID: {{ downloads_storage_uuid }}"

    # --- Portal-Server erstellen ---
    - name: "Portal-Server erstellen"
      ansible.builtin.uri:
        url: "https://api.upcloud.com/1.3/server"
        method: POST
        headers:
          Authorization: "Bearer {{ vault_upcloud_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          server:
            zone: "{{ upcloud_zone }}"
            title: "codefabrik-portal"
            hostname: "codefabrik-portal"
            plan: "{{ portal_upcloud_plan }}"
            metadata: "yes"
            login_user:
              username: root
              ssh_keys:
                ssh_key:
                  - "{{ lookup('file', ssh_key_path + '.pub') }}"
            storage_devices:
              storage_device:
                - action: clone
                  storage: "{{ upcloud_os_template }}"
                  title: "portal-os"
                  size: "{{ portal_upcloud_os_storage }}"
                  tier: "{{ upcloud_storage_tier }}"
                - action: attach
                  storage: "{{ downloads_storage_uuid }}"
        status_code: [200, 201, 202]
      register: portal_server_result

    - name: "Portal UUID und IP speichern"
      ansible.builtin.set_fact:
        portal_uuid: "{{ portal_server_result.json.server.uuid }}"
        portal_ip: "{{ portal_server_result.json.server.ip_addresses.ip_address | selectattr('access', 'eq', 'public') | selectattr('family', 'eq', 'IPv4') | map(attribute='address') | first }}"

    - name: "Warte auf Portal-Server-Start"
      ansible.builtin.uri:
        url: "https://api.upcloud.com/1.3/server/{{ portal_uuid }}"
        method: GET
        headers:
          Authorization: "Bearer {{ vault_upcloud_api_token }}"
        status_code: [200, 404, 409]
      register: portal_status
      until: >-
        portal_status.json is defined and
        portal_status.json.server is defined and
        portal_status.json.server.state is defined and
        portal_status.json.server.state == "started"
      retries: 30
      delay: 10

    - name: "Portal-Info lokal speichern"
      ansible.builtin.copy:
        content: |
          PORTAL_UUID={{ portal_uuid }}
          PORTAL_IP={{ portal_ip }}
          DOWNLOADS_STORAGE_UUID={{ downloads_storage_uuid }}
        dest: "/output/.portal-env"
      delegate_to: localhost

    - name: "Warte auf SSH"
      ansible.builtin.wait_for:
        host: "{{ portal_ip }}"
        port: 22
        timeout: 300
      delegate_to: localhost

    - name: "Inventory dynamisch aktualisieren"
      ansible.builtin.add_host:
        name: "factory-portal"
        ansible_host: "{{ portal_ip }}"
        ansible_user: root
        ansible_ssh_private_key_file: "{{ ssh_key_path }}"
        portal_uuid: "{{ portal_uuid }}"
        portal_ip: "{{ portal_ip }}"
        downloads_storage_uuid: "{{ downloads_storage_uuid }}"
        groups:
          - portal
