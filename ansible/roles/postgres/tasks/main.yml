---
- name: "Warte auf PostgreSQL"
  ansible.builtin.shell: |
    for i in $(seq 1 30); do
      docker exec factory-postgres pg_isready -U forgejo 2>/dev/null && exit 0
      sleep 2
    done
    exit 1
  register: pg_ready
  changed_when: false

- name: "PostgreSQL-Passwort erzwingen (idempotent bei Volume-Reuse)"
  ansible.builtin.shell: |
    docker exec factory-postgres psql -U forgejo -d forgejo -tAq -c \
      "ALTER USER forgejo PASSWORD '{{ postgres_password }}';"
  changed_when: true

- name: "runtime_control Tabelle erstellen"
  ansible.builtin.shell: |
    docker exec factory-postgres psql -U forgejo -d forgejo -tAq -c "
    CREATE TABLE IF NOT EXISTS runtime_control (
        env_name        TEXT PRIMARY KEY,
        mode            TEXT NOT NULL DEFAULT 'PRELIVE'
                        CHECK (mode IN ('OFF', 'PRELIVE', 'LIVE', 'MAINTENANCE')),
        traffic_enabled BOOLEAN NOT NULL DEFAULT FALSE,
        jobs_enabled    BOOLEAN NOT NULL DEFAULT FALSE,
        reason          TEXT DEFAULT '',
        updated_at      TIMESTAMPTZ DEFAULT NOW(),
        updated_by      TEXT DEFAULT ''
    );"
  register: rc_result
  changed_when: "'CREATE' in rc_result.stdout or rc_result.rc == 0"

- name: "runtime_control Default-Eintrag"
  ansible.builtin.shell: |
    docker exec factory-postgres psql -U forgejo -d forgejo -tAq -c "
    INSERT INTO runtime_control (env_name, mode, traffic_enabled, jobs_enabled, updated_by)
    VALUES ('prod', 'PRELIVE', true, false, 'ansible')
    ON CONFLICT (env_name) DO NOTHING;"

- name: "leader_lock Tabelle erstellen"
  ansible.builtin.shell: |
    docker exec factory-postgres psql -U forgejo -d forgejo -tAq -c "
    CREATE TABLE IF NOT EXISTS leader_lock (
        lock_name   TEXT PRIMARY KEY,
        holder_id   TEXT NOT NULL,
        acquired_at TIMESTAMPTZ DEFAULT NOW(),
        expires_at  TIMESTAMPTZ NOT NULL
    );"

- name: "poller_state Tabelle erstellen"
  ansible.builtin.shell: |
    docker exec factory-postgres psql -U forgejo -d forgejo -tAq -c "
    CREATE TABLE IF NOT EXISTS poller_state (
        object_id   TEXT PRIMARY KEY,
        stage       TEXT NOT NULL,
        commit_hash TEXT DEFAULT '',
        updated_at  TIMESTAMPTZ DEFAULT NOW()
    );"

- name: "poller_events Tabelle erstellen"
  ansible.builtin.shell: |
    docker exec factory-postgres psql -U forgejo -d forgejo -tAq -c "
    CREATE TABLE IF NOT EXISTS poller_events (
        id          SERIAL PRIMARY KEY,
        object_id   TEXT NOT NULL,
        event       TEXT NOT NULL,
        details     TEXT,
        created_at  TIMESTAMPTZ DEFAULT NOW()
    );
    CREATE INDEX IF NOT EXISTS idx_poller_events_obj
      ON poller_events (object_id, created_at DESC);"

- name: "pipeline_metrics Tabelle erstellen"
  ansible.builtin.shell: |
    docker exec factory-postgres psql -U forgejo -d forgejo -tAq -c "
    CREATE TABLE IF NOT EXISTS pipeline_metrics (
        id                      SERIAL PRIMARY KEY,
        object_id               TEXT NOT NULL UNIQUE,
        product                 TEXT,
        dispatched_at           TIMESTAMPTZ,
        in_progress_at          TIMESTAMPTZ,
        pr_created_at           TIMESTAMPTZ,
        merged_at               TIMESTAMPTZ,
        blocked_at              TIMESTAMPTZ,
        total_duration_minutes  INTEGER,
        dev_duration_minutes    INTEGER,
        retry_count             INTEGER DEFAULT 0,
        blocked_reason          TEXT
    );"

- name: "pipeline_metrics Review-Spalten (v0.5.5)"
  ansible.builtin.shell: |
    docker exec factory-postgres psql -U forgejo -d forgejo -tAq -c "
    ALTER TABLE pipeline_metrics
      ADD COLUMN IF NOT EXISTS review_iterations INTEGER DEFAULT 0,
      ADD COLUMN IF NOT EXISTS review_started_at TIMESTAMPTZ,
      ADD COLUMN IF NOT EXISTS review_completed_at TIMESTAMPTZ,
      ADD COLUMN IF NOT EXISTS review_verdict TEXT;"

- name: "pipeline_metrics Governance-Spalten (v0.6.0)"
  ansible.builtin.shell: |
    docker exec factory-postgres psql -U forgejo -d forgejo -tAq -c "
    ALTER TABLE pipeline_metrics
      ADD COLUMN IF NOT EXISTS story_type VARCHAR(30),
      ADD COLUMN IF NOT EXISTS lane VARCHAR(10),
      ADD COLUMN IF NOT EXISTS completed_at TIMESTAMPTZ;"

- name: "pipeline_metrics Dauer-Trigger"
  ansible.builtin.shell: |
    docker exec factory-postgres psql -U forgejo -d forgejo -tAq -c "
    CREATE OR REPLACE FUNCTION update_pipeline_durations()
    RETURNS TRIGGER AS \$\$
    BEGIN
      IF NEW.merged_at IS NOT NULL AND NEW.dispatched_at IS NOT NULL THEN
        NEW.total_duration_minutes := EXTRACT(EPOCH FROM (NEW.merged_at - NEW.dispatched_at)) / 60;
      END IF;
      IF NEW.pr_created_at IS NOT NULL AND NEW.in_progress_at IS NOT NULL THEN
        NEW.dev_duration_minutes := EXTRACT(EPOCH FROM (NEW.pr_created_at - NEW.in_progress_at)) / 60;
      END IF;
      RETURN NEW;
    END;
    \$\$ LANGUAGE plpgsql;

    DROP TRIGGER IF EXISTS trg_pipeline_durations ON pipeline_metrics;
    CREATE TRIGGER trg_pipeline_durations
      BEFORE INSERT OR UPDATE ON pipeline_metrics
      FOR EACH ROW EXECUTE FUNCTION update_pipeline_durations();"
