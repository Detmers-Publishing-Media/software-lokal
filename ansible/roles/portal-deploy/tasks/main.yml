---
- name: "Portal-Quellcode auf Server kopieren"
  ansible.builtin.copy:
    src: /portal/
    dest: "{{ portal_docker_compose_dir }}/"
    owner: root
    group: root

- name: ".env fuer Portal generieren"
  ansible.builtin.copy:
    content: |
      # Portal DB
      PORTAL_DB_PASSWORD={{ portal_db_password }}
      DB_HOST=postgres
      DB_PORT=5432
      DB_NAME=portal
      DB_USER=portal

      # Portal Config
      PORTAL_PORT=3200
      NODE_ENV=production

      # PROD Referenzen (direkte IP, beide Server im selben Rechenzentrum)
      PROD_SERVER_UUID={{ prod_server_uuid }}
      PROD_READY_URL=http://{{ prod_server_ip }}:3100/ready
      FORGEJO_URL=http://{{ prod_server_ip }}:3000
      FORGEJO_API_TOKEN={{ forgejo_api_token }}
      PROD_FORGEJO_REPO={{ factory_org }}/{{ process_repo }}

      # UpCloud
      UPCLOUD_API_TOKEN={{ vault_upcloud_api_token }}

      # Auth
      ADMIN_TOKEN={{ admin_token }}

      # Digistore24 IPN
      DIGISTORE_IPN_PASSPHRASE={{ vault_digistore_ipn_passphrase }}
    dest: "{{ portal_docker_compose_dir }}/.env"
    mode: '0600'

- name: "docker-compose.yml deployen"
  ansible.builtin.template:
    src: ../templates/portal-docker-compose.yml.j2
    dest: "{{ portal_docker_compose_dir }}/docker-compose.yml"

- name: "Downloads-Laufwerk formatieren (nur wenn leer)"
  ansible.builtin.shell: |
    if ! blkid /dev/vdb | grep -q ext4; then
      mkfs.ext4 -L downloads /dev/vdb
      echo "FORMATTED"
    else
      echo "ALREADY_FORMATTED"
    fi
  register: format_result
  changed_when: "'FORMATTED' in format_result.stdout"

- name: "Downloads-Mountpoint erstellen"
  ansible.builtin.file:
    path: "{{ portal_downloads_mount }}"
    state: directory
    mode: '0755'

- name: "Downloads-Laufwerk mounten (fstab)"
  ansible.posix.mount:
    path: "{{ portal_downloads_mount }}"
    src: LABEL=downloads
    fstype: ext4
    opts: defaults
    state: mounted

- name: "CI Deploy Key fuer SCP-Uploads einrichten"
  ansible.posix.authorized_key:
    user: root
    key: "{{ lookup('file', ci_deploy_key_path + '.pub') }}"
    key_options: 'no-port-forwarding,no-X11-forwarding,no-agent-forwarding'
    state: present

- name: "Certs-Verzeichnis erstellen"
  ansible.builtin.file:
    path: "{{ portal_docker_compose_dir }}/certs"
    state: directory
    mode: '0700'

- name: "Origin CA Cert deployen"
  ansible.builtin.copy:
    content: "{{ vault_origin_ca_cert }}"
    dest: "{{ portal_docker_compose_dir }}/certs/origin.pem"
    mode: '0600'

- name: "Origin CA Key deployen"
  ansible.builtin.copy:
    content: "{{ vault_origin_ca_key }}"
    dest: "{{ portal_docker_compose_dir }}/certs/origin-key.pem"
    mode: '0600'

- name: "Caddyfile deployen"
  ansible.builtin.template:
    src: ../templates/portal-caddyfile.j2
    dest: "{{ portal_docker_compose_dir }}/Caddyfile"

- name: "Docker Stack starten"
  ansible.builtin.shell: |
    cd {{ portal_docker_compose_dir }} && docker compose up -d --build 2>&1
  register: compose_result

- name: "Docker-Compose Output"
  ansible.builtin.debug:
    msg: "{{ compose_result.stdout_lines[-5:] }}"

- name: "Warte auf Portal-PostgreSQL"
  ansible.builtin.shell: |
    for i in $(seq 1 30); do
      docker exec portal-db pg_isready -U portal -q 2>/dev/null && exit 0
      sleep 2
    done
    echo "Portal-PostgreSQL nicht bereit nach 60s"
    exit 1
  changed_when: false

- name: "Warte auf Portal-App (HTTP-Ready, vor DB-Init)"
  ansible.builtin.uri:
    url: "http://localhost:3200/"
    status_code: 200
  retries: 15
  delay: 5
  register: portal_ready
