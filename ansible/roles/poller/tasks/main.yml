---
- name: "Poller-Script deployen"
  ansible.builtin.template:
    src: openclaw-poller.sh.j2
    dest: /opt/codefabrik/openclaw-poller.sh
    mode: '0755'

- name: "Governance-Verzeichnis erstellen"
  ansible.builtin.file:
    path: /opt/codefabrik/docs/governance
    state: directory
    mode: '0755'

- name: "Governance-Dateien deployen"
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "/opt/codefabrik/{{ item.dest }}"
    mode: '0644'
  loop:
    - { src: "/docs/governance/story-types.yml", dest: "docs/governance/story-types.yml" }
    - { src: "/docs/governance/protected-paths.yml", dest: "docs/governance/protected-paths.yml" }

- name: "Governance-Validierungsscript deployen"
  ansible.builtin.copy:
    src: "/scripts/validate-story-governance.mjs"
    dest: /opt/codefabrik/validate-story-governance.mjs
    mode: '0755'

- name: "Poller Secrets-Datei erstellen"
  ansible.builtin.copy:
    content: |
      FORGEJO_API_TOKEN={{ forgejo_api_token }}
    dest: /opt/codefabrik/.poller-secrets.env
    mode: '0600'
    owner: root
    group: root
  no_log: true

- name: "Poller systemd Service"
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=OpenClaw Poller

      [Service]
      Type=oneshot
      ExecStart=/opt/codefabrik/openclaw-poller.sh
      EnvironmentFile=/opt/codefabrik/.poller-secrets.env
    dest: /etc/systemd/system/openclaw-poller.service

- name: "Poller systemd Timer"
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=OpenClaw Poller Timer

      [Timer]
      OnBootSec=60
      OnUnitActiveSec=30
      AccuracySec=5

      [Install]
      WantedBy=timers.target
    dest: /etc/systemd/system/openclaw-poller.timer

- name: "Poller Timer starten"
  ansible.builtin.systemd:
    name: openclaw-poller.timer
    state: started
    enabled: yes
    daemon_reload: yes
