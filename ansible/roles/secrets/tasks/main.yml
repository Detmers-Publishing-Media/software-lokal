---
- name: "Forgejo Secrets setzen"
  ansible.builtin.uri:
    url: "http://localhost:3000/api/v1/orgs/{{ factory_org }}/actions/secrets/{{ item.name }}"
    method: PUT
    headers:
      Authorization: "token {{ forgejo_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      data: "{{ item.value }}"
    status_code: [201, 204]
  loop:
    - { name: "OLLAMA_API_KEY", value: "{{ vault_ollama_api_key }}" }
    - { name: "OLLAMA_HOST", value: "{{ vault_ollama_host }}" }
    - { name: "FORGEJO_TOKEN", value: "{{ forgejo_api_token }}" }
  no_log: true
