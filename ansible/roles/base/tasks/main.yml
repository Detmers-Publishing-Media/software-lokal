---
- name: "unattended-upgrades stoppen und deaktivieren"
  ansible.builtin.shell: |
    systemctl stop unattended-upgrades 2>/dev/null || true
    systemctl disable unattended-upgrades 2>/dev/null || true
    killall -9 unattended-upgr 2>/dev/null || true
    while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do
      echo "dpkg-Lock belegt, warte 5s..."
      sleep 5
    done
  changed_when: false

- name: "APT aktualisieren"
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: "Grundpakete installieren"
  ansible.builtin.apt:
    name:
      - curl
      - git
      - jq
      - unzip
      - ufw
      - ca-certificates
      - gnupg
      - lsb-release
      - rsync
      - postgresql-client
    state: present

- name: "Docker GPG Key"
  ansible.builtin.shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
    chmod a+r /etc/apt/keyrings/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.asc

- name: "Docker APT Repo"
  ansible.builtin.shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
    https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
    > /etc/apt/sources.list.d/docker.list
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: "APT aktualisieren (Docker Repo)"
  ansible.builtin.apt:
    update_cache: yes

- name: "Docker installieren"
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present

- name: "Docker Service starten"
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes

- name: "Node.js 22 installieren (für act_runner)"
  ansible.builtin.shell: |
    curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    apt-get install -y nodejs
  args:
    creates: /usr/bin/node

- name: "UFW: Default deny incoming"
  community.general.ufw:
    direction: incoming
    default: deny

- name: "UFW: Default allow outgoing"
  community.general.ufw:
    direction: outgoing
    default: allow

- name: "UFW: Ports oeffnen"
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop:
    - { port: "22", proto: tcp }
    - { port: "80", proto: tcp }
    - { port: "443", proto: tcp }
    - { port: "3100", proto: tcp }

- name: "UFW aktivieren"
  community.general.ufw:
    state: enabled

- name: "Arbeitsverzeichnis erstellen"
  ansible.builtin.file:
    path: "{{ docker_compose_dir }}"
    state: directory
    mode: '0755'
