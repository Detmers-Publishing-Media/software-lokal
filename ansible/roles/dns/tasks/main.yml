---
# DNS-Records idempotent anlegen/aktualisieren (GET → PUT oder POST)
- name: "DNS Records pruefen (GET)"
  delegate_to: localhost
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records?name={{ item.name }}.{{ cloudflare_zone }}&type=A"
    method: GET
    headers:
      Authorization: "Bearer {{ vault_cloudflare_api_token }}"
    status_code: [200]
  loop: "{{ dns_records }}"
  register: dns_existing

- name: "DNS Records anlegen oder aktualisieren"
  delegate_to: localhost
  ansible.builtin.uri:
    url: >-
      https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records{{
        '/' + item.0.json.result[0].id if item.0.json.result | length > 0 else '' }}
    method: "{{ 'PUT' if item.0.json.result | length > 0 else 'POST' }}"
    headers:
      Authorization: "Bearer {{ vault_cloudflare_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      type: A
      name: "{{ item.1.name }}"
      content: "{{ server_ip }}"
      ttl: 1
      proxied: "{{ item.1.proxied | default(true) }}"
    status_code: [200, 201]
  loop: "{{ dns_existing.results | zip(dns_records) | list }}"
  loop_control:
    label: "{{ item.1.name }}"
  register: dns_results

- name: "DNS-Validierung via Cloudflare API"
  delegate_to: localhost
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records?name={{ item.name }}.{{ cloudflare_zone }}&type=A"
    method: GET
    headers:
      Authorization: "Bearer {{ vault_cloudflare_api_token }}"
    status_code: [200]
  register: dns_verify
  loop: "{{ dns_records }}"
  failed_when: >
    dns_verify.json.result | length == 0 or
    dns_verify.json.result[0].content != server_ip
