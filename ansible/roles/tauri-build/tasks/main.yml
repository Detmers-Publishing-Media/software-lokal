---
# ── Tauri Build-Toolchain (Host-Modus) ──

- name: "Tauri System-Abhaengigkeiten installieren"
  ansible.builtin.apt:
    name:
      - build-essential
      - libwebkit2gtk-4.1-dev
      - libssl-dev
      - libgtk-3-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
      - libsoup-3.0-dev
      - libjavascriptcoregtk-4.1-dev
      - file
      - patchelf
    state: present
    update_cache: yes

- name: "Rust pruefen"
  ansible.builtin.command: /root/.cargo/bin/rustc --version
  register: rust_check
  changed_when: false
  failed_when: false

- name: "Rust installieren (rustup)"
  ansible.builtin.shell: |
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
  when: rust_check.rc != 0

- name: "Rust PATH in Profil sicherstellen"
  ansible.builtin.lineinfile:
    path: /root/.bashrc
    line: 'source "$HOME/.cargo/env"'
    create: yes

- name: "pnpm installieren"
  ansible.builtin.shell: |
    npm install -g pnpm
  args:
    creates: /usr/lib/node_modules/pnpm

- name: "Tauri CLI installieren"
  ansible.builtin.shell: |
    /root/.cargo/bin/cargo install tauri-cli
  args:
    creates: /root/.cargo/bin/cargo-tauri
  environment:
    PATH: "/root/.cargo/bin:{{ ansible_env.PATH }}"

- name: "Tauri Build-Toolchain verifizieren"
  ansible.builtin.shell: |
    /root/.cargo/bin/rustc --version && \
    /root/.cargo/bin/cargo tauri --version && \
    pnpm --version
  register: tauri_verify
  changed_when: false

- name: "Tauri-Versionen ausgeben"
  ansible.builtin.debug:
    msg: "{{ tauri_verify.stdout_lines }}"
