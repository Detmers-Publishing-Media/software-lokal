---
# Aider Setup (ersetzt den ehemaligen OpenClaw Docker Container)
# Aider laeuft direkt auf dem Host mit Ollama.com API

- name: "Aider venv erstellen"
  ansible.builtin.command:
    cmd: python3 -m venv /opt/aider-venv
    creates: /opt/aider-venv/bin/python3

- name: "Aider installieren"
  ansible.builtin.pip:
    name: aider-chat
    virtualenv: /opt/aider-venv
    state: present

- name: "Aider Version pruefen"
  ansible.builtin.command:
    cmd: /opt/aider-venv/bin/aider --version
  register: aider_version
  changed_when: false

- name: "Aider Version anzeigen"
  ansible.builtin.debug:
    msg: "Aider: {{ aider_version.stdout }}"

- name: "Repos-Verzeichnis erstellen"
  ansible.builtin.file:
    path: /mnt/data/repos
    state: directory
    mode: '0755'

- name: "Git-Konfiguration fuer Aider"
  ansible.builtin.shell: |
    git config --global user.name "Factory Junior"
    git config --global user.email "junior@factory.local"
  changed_when: false
