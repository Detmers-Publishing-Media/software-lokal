---
- name: "Smoke-Test: Forgejo API"
  ansible.builtin.uri:
    url: "http://localhost:3000/api/v1/version"
    status_code: 200
  register: forgejo_check

- name: "Smoke-Test: PostgreSQL"
  ansible.builtin.shell: docker exec factory-postgres pg_isready -U forgejo
  register: pg_check
  changed_when: false

- name: "Smoke-Test: OpenClaw"
  ansible.builtin.shell: docker exec factory-openclaw echo alive
  register: openclaw_check
  changed_when: false

- name: "Smoke-Test: Runner"
  ansible.builtin.shell: systemctl is-active act-runner
  register: runner_check
  changed_when: false

- name: "Smoke-Test: Poller Timer"
  ansible.builtin.shell: systemctl is-active openclaw-poller.timer
  register: poller_check
  changed_when: false

- name: "Smoke-Test: Gateway /health"
  ansible.builtin.uri:
    url: "http://localhost:3100/health"
    status_code: 200
  register: health_check

- name: "Runtime Control auf LIVE setzen"
  ansible.builtin.shell: |
    docker exec factory-postgres psql -U forgejo -d forgejo -tAq -c "
    UPDATE runtime_control SET mode='LIVE', traffic_enabled=true,
    jobs_enabled=true, reason='', updated_by='ansible', updated_at=NOW()
    WHERE env_name='prod';"

- name: "Smoke-Test: Gateway /ready (nach LIVE)"
  ansible.builtin.uri:
    url: "http://localhost:3100/ready"
    status_code: 200
  register: ready_check
  retries: 3
  delay: 5

- name: "Deep-Smoke: Poller-Verarbeitung von STORY-000099 (nur Bootstrap)"
  when: ops_mode is not defined or ops_mode == 'bootstrap'
  block:
    - name: "Deep-Smoke: Poller-Verarbeitung von STORY-000099 (nicht-blockierend)"
      ansible.builtin.shell: |
        for i in $(seq 1 20); do
          STATE=$(docker exec factory-postgres psql -U forgejo -d forgejo -tAq -c \
            "SELECT stage FROM poller_state WHERE object_id='STORY-000099'" 2>/dev/null | tr -d '[:space:]')
          if [ "$STATE" = "pr_created" ] || [ "$STATE" = "done" ]; then
            echo "DEEP_SMOKE_SUCCESS: STORY-000099 reached stage $STATE"
            exit 0
          fi
          echo "Warte... stage=$STATE ($(($i * 10))s)"
          sleep 10
        done
        echo "DEEP_SMOKE_TIMEOUT: STORY-000099 did not complete in 200 seconds (stage=$STATE)"
        exit 0
      register: smoke_result
      changed_when: false

    - name: "Deep-Smoke Ergebnis"
      ansible.builtin.debug:
        msg: "{{ smoke_result.stdout_lines[-1] }}"

    - name: "Deep-Smoke Warnung bei Timeout"
      ansible.builtin.debug:
        msg: "WARNUNG: Poller/OpenClaw Pipeline hat STORY-000099 nicht verarbeitet. Bitte manuell pruefen."
      when: "'DEEP_SMOKE_TIMEOUT' in smoke_result.stdout"

- name: "Deep-Smoke uebersprungen"
  ansible.builtin.debug:
    msg: "Deep-Smoke uebersprungen (ops_mode={{ ops_mode }})"
  when: ops_mode is defined and ops_mode != 'bootstrap'

- name: "Smoke-Test: Nightstop Timer"
  ansible.builtin.shell: systemctl is-active codefabrik-nightstop.timer
  register: nightstop_check
  changed_when: false

- name: "Smoke-Test: Nightstart Timer"
  ansible.builtin.shell: systemctl is-active codefabrik-nightstart.timer
  register: nightstart_check
  changed_when: false

- name: "Smoke-Test: Externer HTTPS-Zugriff Forgejo"
  ansible.builtin.uri:
    url: "https://{{ forgejo_domain }}/api/v1/version"
    status_code: 200
    validate_certs: false
  register: ext_forgejo_check
  retries: 6
  delay: 10
  delegate_to: localhost

- name: "Smoke-Test: Externer HTTPS-Zugriff Gateway"
  ansible.builtin.uri:
    url: "https://gateway.{{ cloudflare_zone }}/health"
    status_code: 200
    validate_certs: false
  register: ext_gateway_check
  retries: 6
  delay: 10
  delegate_to: localhost

- name: "Smoke-Test: DNS Records korrekt (IP + Proxied)"
  delegate_to: localhost
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records?name={{ item.name }}.{{ cloudflare_zone }}&type=A"
    method: GET
    headers:
      Authorization: "Bearer {{ vault_cloudflare_api_token }}"
    status_code: [200]
  register: dns_smoke
  loop: "{{ dns_records }}"
  failed_when: >
    dns_smoke.json.result | length == 0 or
    dns_smoke.json.result[0].content != server_ip or
    dns_smoke.json.result[0].proxied != (item.proxied | default(true))

- name: "Smoke-Test Ergebnis"
  ansible.builtin.debug:
    msg: |
      Smoke-Test Ergebnis:
        Forgejo:       ✅
        Postgres:      ✅
        OpenClaw:      ✅
        Runner:        ✅
        Poller:        ✅
        Nightstop:     ✅
        Nightstart:    ✅
        /health:       ✅
        /ready:        ✅
        HTTPS Forgejo: ✅ (extern)
        HTTPS Gateway: ✅ (extern)
        DNS Records:   ✅ (IP + Proxied)
        Pipeline:      {{ smoke_result.stdout_lines[-1] | default('uebersprungen') }} ({{ 'nicht-blockierend' if smoke_result is defined else 'nur bei Bootstrap' }})
