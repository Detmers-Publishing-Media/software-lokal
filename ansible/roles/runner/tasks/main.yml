---
- name: "act_runner herunterladen"
  ansible.builtin.shell: |
    RUNNER_VERSION=$(curl -sf "https://code.forgejo.org/api/v1/repos/forgejo/runner/releases/latest" | jq -r '.tag_name // "v6.3.1"')
    curl -sL "https://code.forgejo.org/forgejo/runner/releases/download/${RUNNER_VERSION}/forgejo-runner-${RUNNER_VERSION#v}-linux-amd64" \
      -o /usr/local/bin/act_runner
    chmod +x /usr/local/bin/act_runner
  args:
    creates: /usr/local/bin/act_runner

- name: "Runner-Verzeichnis erstellen"
  ansible.builtin.file:
    path: /opt/act_runner
    state: directory
    mode: '0755'

- name: "Runner-Token generieren"
  ansible.builtin.shell: |
    docker exec -u git factory-forgejo forgejo actions generate-runner-token 2>/dev/null | tail -1
  register: runner_token_result
  retries: 5
  delay: 5
  until: runner_token_result.stdout | length > 5

- name: "Runner registrieren"
  ansible.builtin.shell: |
    cd /opt/act_runner && \
    act_runner register --no-interactive \
      --instance http://localhost:3000 \
      --token "{{ runner_token_result.stdout }}" \
      --name factory-runner \
      --labels "ubuntu-latest:host"
  args:
    creates: /opt/act_runner/.runner

- name: "Runner systemd Service"
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Forgejo Act Runner
      After=docker.service
      Requires=docker.service

      [Service]
      Type=simple
      WorkingDirectory=/opt/act_runner
      ExecStart=/usr/local/bin/act_runner daemon
      Restart=always
      RestartSec=10

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/act-runner.service

- name: "Runner Service starten"
  ansible.builtin.systemd:
    name: act-runner
    state: started
    enabled: yes
    daemon_reload: yes
