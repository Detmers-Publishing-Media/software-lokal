---
# Nur repos + poller (server läuft, forgejo configured)
- name: "Repos + Poller einrichten"
  hosts: factory-prod
  gather_facts: false
  vars:
    server_ip: "212.147.230.92"
    forgejo_admin_password: "{{ lookup('ini', 'forgejo_admin_password type=properties file=/tmp/factory-passwords.env') }}"
    postgres_password: "{{ lookup('ini', 'postgres_password type=properties file=/tmp/factory-passwords.env') }}"
    jwt_secret: "{{ lookup('ini', 'jwt_secret type=properties file=/tmp/factory-passwords.env') }}"
  pre_tasks:
    - name: "Forgejo Token aus .tokens-env laden"
      ansible.builtin.set_fact:
        forgejo_api_token: "{{ lookup('ini', 'FORGEJO_API_TOKEN type=properties file=' + lookup('env', 'HOME') + '/code-fabrik/.tokens-env') }}"
        deploy_key_pub:
          stdout: ""
  roles:
    - repos
    - secrets
    - poller
