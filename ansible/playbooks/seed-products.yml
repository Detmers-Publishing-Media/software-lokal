---
- name: "Inventory laden"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: "Server-IP aus .server-env laden"
      ansible.builtin.shell: cat /output/.server-env
      register: server_env_raw

    - name: "factory-prod registrieren"
      ansible.builtin.add_host:
        name: factory-prod
        ansible_host: "{{ (server_env_raw.stdout | regex_search('SERVER_IP=(.+)', '\\1'))[0] }}"
        ansible_user: root
        ansible_ssh_private_key_file: "~/.ssh/codefabrik_deploy"
        groups: [prod]

- name: "Preflight: Docker-Services sicherstellen"
  hosts: factory-prod
  gather_facts: false
  tasks:
    - name: "Docker Stack starten falls noetig"
      ansible.builtin.shell: |
        cd /opt/codefabrik && docker compose up -d
      changed_when: false

    - name: "Warte auf Forgejo (max 60s)"
      ansible.builtin.uri:
        url: "http://localhost:3000/api/v1/version"
        method: GET
        status_code: [200]
      register: forgejo_health
      retries: 12
      delay: 5
      until: forgejo_health.status == 200

- name: "Produkt-Repos + Releases in Forgejo erstellen"
  hosts: factory-prod
  gather_facts: false
  vars:
    forgejo_api_token: "{{ lookup('ini', 'FORGEJO_API_TOKEN type=properties file=/output/.tokens-env') }}"
  roles:
    - product-seed
