---
- name: "Code-Fabrik abreißen"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: "ops_mode validieren"
      ansible.builtin.assert:
        that: ops_mode is defined and ops_mode == 'teardown'
        fail_msg: "teardown.yml darf nur im Teardown-Modus laufen (ops_mode={{ ops_mode | default('NICHT_GESETZT') }})"

    - name: "Server-Info aus .server-env laden"
      ansible.builtin.shell: |
        source /output/.server-env && echo "UUID=$SERVER_UUID IP=$SERVER_IP"
      register: server_info
      ignore_errors: true

    - name: "SERVER_UUID und SERVER_IP setzen"
      ansible.builtin.set_fact:
        server_uuid: "{{ (server_info.stdout | regex_search('UUID=([^\\s]+)', '\\1'))[0] | default('') }}"
        server_ip: "{{ (server_info.stdout | regex_search('IP=([^\\s]+)', '\\1'))[0] | default('') }}"
      when: server_info.rc == 0

    - name: "Server stoppen"
      ansible.builtin.uri:
        url: "https://api.upcloud.com/1.3/server/{{ server_uuid }}/stop"
        method: POST
        headers:
          Authorization: "Bearer {{ vault_upcloud_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          stop_server:
            stop_type: hard
            timeout: 60
      ignore_errors: true
      when: server_uuid is defined and server_uuid | length > 0

    - name: "Warte auf Stop (30s)"
      ansible.builtin.pause:
        seconds: 30
      when: server_uuid is defined and server_uuid | length > 0

    - name: "Server löschen"
      ansible.builtin.uri:
        url: "https://api.upcloud.com/1.3/server/{{ server_uuid }}/?storages=1&backups=delete"
        method: DELETE
        headers:
          Authorization: "Bearer {{ vault_upcloud_api_token }}"
          Content-Type: "application/json"
      ignore_errors: true
      when: server_uuid is defined and server_uuid | length > 0

    - name: "DNS-Records aufräumen"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/dns/tasks/cleanup.yml"
      ignore_errors: true

    - name: "Lokale Dateien aufräumen"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/output/.server-env"
        - "/output/.tokens-env"
        - "/output/.factory-passwords.env"
