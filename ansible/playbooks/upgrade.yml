---
# Code-Fabrik — PROD Upgrade
# Server bleibt stehen, Config/Code/Rollen werden aktualisiert
# Voraussetzung: ops_mode=upgrade, Server muss existieren

- name: "Phase 0: Modus + Inventory"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: "ops_mode validieren"
      ansible.builtin.assert:
        that: ops_mode is defined and ops_mode == 'upgrade'
        fail_msg: "upgrade.yml darf nur im Upgrade-Modus laufen (ops_mode={{ ops_mode | default('NICHT_GESETZT') }})"

    - name: ".server-env muss existieren"
      ansible.builtin.stat:
        path: /output/.server-env
      register: server_env_stat
      failed_when: not server_env_stat.stat.exists

    - name: ".tokens-env muss existieren"
      ansible.builtin.stat:
        path: /output/.tokens-env
      register: tokens_env_stat
      failed_when: not tokens_env_stat.stat.exists

    - name: "Server-IP laden"
      ansible.builtin.shell: cat /output/.server-env
      register: server_env_raw

    - name: "factory-prod registrieren"
      ansible.builtin.add_host:
        name: factory-prod
        ansible_host: "{{ (server_env_raw.stdout | regex_search('SERVER_IP=(.+)', '\\1'))[0] }}"
        ansible_user: root
        ansible_ssh_private_key_file: "~/.ssh/codefabrik_deploy"
        groups: [prod]

    - name: "SSH-Verbindung pruefen"
      ansible.builtin.wait_for:
        host: "{{ (server_env_raw.stdout | regex_search('SERVER_IP=(.+)', '\\1'))[0] }}"
        port: 22
        timeout: 30

- name: "Phase 1: Docker-Services sicherstellen"
  hosts: factory-prod
  gather_facts: false
  tasks:
    - name: "Docker Stack starten falls noetig"
      ansible.builtin.shell: |
        cd /opt/codefabrik && docker compose up -d
      changed_when: false

    - name: "Warte auf PostgreSQL"
      ansible.builtin.shell: |
        for i in $(seq 1 30); do
          docker exec factory-postgres pg_isready -U forgejo -q 2>/dev/null && exit 0
          sleep 2
        done
        echo "PostgreSQL nicht bereit nach 60s"
        exit 1
      changed_when: false

    - name: "Warte auf Forgejo"
      ansible.builtin.uri:
        url: "http://localhost:3000/api/v1/version"
        status_code: 200
      retries: 12
      delay: 5

- name: "Phase 2: Config aktualisieren"
  hosts: factory-prod
  gather_facts: true
  vars:
    forgejo_admin_password: "{{ lookup('ini', 'forgejo_admin_password type=properties file=/output/.factory-passwords.env') }}"
    postgres_password: "{{ lookup('ini', 'postgres_password type=properties file=/output/.factory-passwords.env') }}"
    jwt_secret: "{{ lookup('ini', 'jwt_secret type=properties file=/output/.factory-passwords.env') }}"
  roles:
    - caddy
    - gateway

  post_tasks:
    - name: "docker-compose.yml aktualisieren"
      ansible.builtin.template:
        src: ../templates/docker-compose.yml.j2
        dest: "{{ docker_compose_dir }}/docker-compose.yml"

    - name: "Docker Stack neu starten"
      ansible.builtin.shell: |
        cd {{ docker_compose_dir }} && docker compose up -d --build 2>&1
      register: compose_result

    - name: "Warte auf PostgreSQL"
      ansible.builtin.shell: |
        for i in $(seq 1 30); do
          docker exec factory-postgres pg_isready -U forgejo -q 2>/dev/null && exit 0
          sleep 2
        done
        exit 1
      changed_when: false

    - name: "Warte auf Forgejo"
      ansible.builtin.uri:
        url: "http://localhost:3000/api/v1/version"
        status_code: 200
      retries: 12
      delay: 5

- name: "Phase 3: Services aktualisieren"
  hosts: factory-prod
  gather_facts: false
  vars:
    forgejo_admin_password: "{{ lookup('ini', 'forgejo_admin_password type=properties file=/output/.factory-passwords.env') }}"
    postgres_password: "{{ lookup('ini', 'postgres_password type=properties file=/output/.factory-passwords.env') }}"
    jwt_secret: "{{ lookup('ini', 'jwt_secret type=properties file=/output/.factory-passwords.env') }}"
    ops_mode: upgrade
  roles:
    - postgres
    - forgejo
    - secrets
    - poller
    - nightstop

- name: "Phase 4: Smoke-Test"
  hosts: factory-prod
  gather_facts: false
  vars:
    server_ip: "{{ ansible_host }}"
  roles:
    - smoke-test

- name: "Phase 5: Infra nach Forgejo pushen"
  hosts: factory-prod
  gather_facts: false
  tags: [push-infra]
  vars:
    forgejo_api_token: "{{ lookup('ini', 'FORGEJO_API_TOKEN type=properties file=/output/.tokens-env') }}"
  roles:
    - push-infra
