---
- name: "Portal abreissen"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: "ops_mode validieren"
      ansible.builtin.assert:
        that: ops_mode is defined and ops_mode == 'teardown'
        fail_msg: "teardown-portal.yml darf nur im Teardown-Modus laufen (ops_mode={{ ops_mode | default('NICHT_GESETZT') }})"

    - name: "Portal-Info aus .portal-env laden"
      ansible.builtin.shell: |
        cat /output/.portal-env 2>/dev/null
      register: portal_info
      ignore_errors: true

    - name: "PORTAL_UUID, PORTAL_IP und DOWNLOADS_STORAGE_UUID setzen"
      ansible.builtin.set_fact:
        portal_uuid: "{{ (portal_info.stdout | regex_search('PORTAL_UUID=([^\\s]+)', '\\1'))[0] | default('') }}"
        portal_ip: "{{ (portal_info.stdout | regex_search('PORTAL_IP=([^\\s]+)', '\\1'))[0] | default('') }}"
        downloads_storage_uuid: "{{ (portal_info.stdout | regex_search('DOWNLOADS_STORAGE_UUID=([^\\s]+)', '\\1'))[0] | default('') }}"
      when: portal_info.rc == 0

    - name: "Portal-Server stoppen"
      ansible.builtin.uri:
        url: "https://api.upcloud.com/1.3/server/{{ portal_uuid }}/stop"
        method: POST
        headers:
          Authorization: "Bearer {{ vault_upcloud_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          stop_server:
            stop_type: hard
            timeout: 60
      ignore_errors: true
      when: portal_uuid is defined and portal_uuid | length > 0

    - name: "Warte auf Stop (30s)"
      ansible.builtin.pause:
        seconds: 30
      when: portal_uuid is defined and portal_uuid | length > 0

    - name: "Downloads-Storage vom Server detachen"
      ansible.builtin.uri:
        url: "https://api.upcloud.com/1.3/server/{{ portal_uuid }}/storage/detach"
        method: POST
        headers:
          Authorization: "Bearer {{ vault_upcloud_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          storage_device:
            address: "virtio:1"
      ignore_errors: true
      when: >
        portal_uuid is defined and portal_uuid | length > 0 and
        downloads_storage_uuid is defined and downloads_storage_uuid | length > 0

    - name: "Portal-Server loeschen (nur OS-Storage)"
      ansible.builtin.uri:
        url: "https://api.upcloud.com/1.3/server/{{ portal_uuid }}/?storages=1&backups=delete"
        method: DELETE
        headers:
          Authorization: "Bearer {{ vault_upcloud_api_token }}"
          Content-Type: "application/json"
      ignore_errors: true
      when: portal_uuid is defined and portal_uuid | length > 0

    - name: "Downloads-Storage bleibt erhalten"
      ansible.builtin.debug:
        msg: "Downloads-Storage {{ downloads_storage_uuid }} wurde NICHT geloescht (persistent)"
      when: downloads_storage_uuid is defined and downloads_storage_uuid | length > 0

    - name: "Portal DNS-Record finden"
      ansible.builtin.uri:
        url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records?name=portal.{{ cloudflare_zone }}"
        method: GET
        headers:
          Authorization: "Bearer {{ vault_cloudflare_api_token }}"
      register: portal_dns_result
      ignore_errors: true

    - name: "Portal DNS-Records loeschen"
      ansible.builtin.uri:
        url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records/{{ item.id }}"
        method: DELETE
        headers:
          Authorization: "Bearer {{ vault_cloudflare_api_token }}"
      loop: "{{ portal_dns_result.json.result | default([]) }}"
      ignore_errors: true
      when: portal_dns_result is defined and portal_dns_result.json.result | default([]) | length > 0

    - name: "Lokale Dateien aufraeumen"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/output/.portal-env"
        - "/output/.portal-passwords.env"
        - "/output/.portal-smoke-results.env"
