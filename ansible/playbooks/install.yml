---
- name: "Phase 0: Installationsmodus"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: "UpCloud: Pruefe ob codefabrik-prod existiert"
      ansible.builtin.uri:
        url: "https://api.upcloud.com/1.3/server"
        method: GET
        headers:
          Authorization: "Bearer {{ vault_upcloud_api_token }}"
        status_code: [200]
      register: upcloud_servers

    - name: "Bestehenden Server finden"
      ansible.builtin.set_fact:
        existing_servers: "{{ upcloud_servers.json.servers.server | selectattr('title', 'eq', 'codefabrik-prod') | list }}"

    - name: "Server-Existenz pruefen"
      ansible.builtin.set_fact:
        server_exists: "{{ existing_servers | length > 0 }}"
        server_uuid: "{{ (existing_servers | first).uuid | default('') }}"

    - name: "Installationsmodus abfragen"
      ansible.builtin.pause:
        prompt: |

          {% if server_exists | bool %}Server 'codefabrik-prod' existiert ({{ server_uuid }}) — wird abgerissen.{% else %}Kein Server gefunden — Neuinstallation.{% endif %}

            1) Neuinstallation (bestehenden Server abreissen falls vorhanden)
            2) Update (Server bleibt stehen, nur bei bestehendem Server)
            3) Abbrechen
          Auswahl
      register: install_mode

    - name: "Abbrechen"
      ansible.builtin.fail:
        msg: "Installation abgebrochen."
      when: install_mode.user_input | trim == "3"

    - name: "Update ohne Server nicht moeglich"
      ansible.builtin.fail:
        msg: "Update nicht moeglich — kein bestehender Server gefunden."
      when: install_mode.user_input | trim == "2" and not (server_exists | bool)

    - name: "Modus setzen"
      ansible.builtin.set_fact:
        install_type: "{{ 'update' if install_mode.user_input | trim == '2' else 'fresh' }}"

    # --- Aufraeum-Block: Loescht bestehenden Server falls vorhanden ---
    - name: "Aufraeumen: Server stoppen"
      ansible.builtin.uri:
        url: "https://api.upcloud.com/1.3/server/{{ server_uuid }}/stop"
        method: POST
        headers:
          Authorization: "Bearer {{ vault_upcloud_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          stop_server:
            stop_type: hard
            timeout: 60
        status_code: [200, 409]
      ignore_errors: true
      when: install_type == 'fresh' and server_exists | bool

    - name: "Aufraeumen: Warte auf Stop (30s)"
      ansible.builtin.pause:
        seconds: 30
      when: install_type == 'fresh' and server_exists | bool

    - name: "Aufraeumen: Server loeschen"
      ansible.builtin.uri:
        url: "https://api.upcloud.com/1.3/server/{{ server_uuid }}/?storages=1&backups=delete"
        method: DELETE
        headers:
          Authorization: "Bearer {{ vault_upcloud_api_token }}"
          Content-Type: "application/json"
        status_code: [200, 204]
      ignore_errors: true
      when: install_type == 'fresh' and server_exists | bool

    - name: "Aufraeumen: Warte auf Loeschung (30s)"
      ansible.builtin.pause:
        seconds: 30
      when: install_type == 'fresh' and server_exists | bool

    - name: "Aufraeumen: DNS-Records entfernen"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/dns/tasks/cleanup.yml"
      ignore_errors: true
      when: install_type == 'fresh' and server_exists | bool

    - name: "Aufraeumen: Lokale Dateien entfernen"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/output/.server-env"
        - "/output/.tokens-env"
        - "/output/.factory-passwords.env"
      when: install_type == 'fresh'

    - name: "install_type in Datei speichern"
      ansible.builtin.copy:
        content: "{{ install_type }}"
        dest: "/output/.install-type"

    - name: "Kein Server vorhanden — ueberspringe Aufraeumen"
      ansible.builtin.debug:
        msg: "Kein bestehender Server gefunden. Starte Neuinstallation."
      when: install_type == 'fresh' and not (server_exists | bool)

    - name: "Update: Server-Details von UpCloud laden"
      ansible.builtin.uri:
        url: "https://api.upcloud.com/1.3/server/{{ server_uuid }}"
        method: GET
        headers:
          Authorization: "Bearer {{ vault_upcloud_api_token }}"
        status_code: [200]
        timeout: 120
      register: server_details
      when: install_type == 'update'

    - name: "Update: Server-IP extrahieren"
      ansible.builtin.set_fact:
        update_server_ip: "{{ server_details.json.server.ip_addresses.ip_address | selectattr('access', 'eq', 'public') | selectattr('family', 'eq', 'IPv4') | map(attribute='address') | first }}"
      when: install_type == 'update'

    - name: "Update: Bestehenden Server ins Inventory aufnehmen"
      ansible.builtin.add_host:
        name: factory-prod
        ansible_host: "{{ update_server_ip }}"
        ansible_user: root
        ansible_ssh_private_key_file: "~/.ssh/codefabrik_deploy"
        groups: [prod]
      when: install_type == 'update'

    - name: "Update: .server-env schreiben (fuer Portal + Seed)"
      ansible.builtin.copy:
        content: |
          SERVER_UUID={{ server_uuid }}
          SERVER_IP={{ update_server_ip }}
        dest: /output/.server-env
        mode: '0600'
      when: install_type == 'update'

- name: "Phase 1: Server provisionieren"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    server_role: prod
    install_type: "{{ lookup('file', '/output/.install-type') }}"
  roles:
    - role: server
      when: install_type != 'update'

- name: "Phase 1b: DNS erstellen"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    install_type: "{{ lookup('file', '/output/.install-type') }}"
  tasks:
    - name: "Server-Variablen aus .server-env laden"
      ansible.builtin.shell: |
        cat /output/.server-env
      register: server_env_raw
      delegate_to: localhost
      when: install_type != 'update'

    - name: "server_ip aus .server-env setzen"
      ansible.builtin.set_fact:
        server_ip: "{{ (server_env_raw.stdout | regex_search('SERVER_IP=(.+)', '\\1'))[0] }}"
      when: install_type != 'update'

    - name: "DNS-Records erstellen"
      ansible.builtin.include_role:
        name: dns
      when: install_type != 'update'

- name: "Phase 2: Server konfigurieren"
  hosts: factory-prod
  gather_facts: true
  pre_tasks:
    - name: "Prüfe ob Passwörter existieren"
      ansible.builtin.stat:
        path: /output/.factory-passwords.env
      register: existing_passwords
      delegate_to: localhost

    - name: "Existierende Passwörter laden (Reinstall)"
      ansible.builtin.set_fact:
        forgejo_admin_password: "{{ lookup('ini', 'forgejo_admin_password type=properties file=/output/.factory-passwords.env') }}"
        postgres_password: "{{ lookup('ini', 'postgres_password type=properties file=/output/.factory-passwords.env') }}"
        jwt_secret: "{{ lookup('ini', 'jwt_secret type=properties file=/output/.factory-passwords.env') }}"
      when: existing_passwords.stat.exists
      delegate_to: localhost

    - name: "Neue Passwörter generieren (Erstinstallation)"
      ansible.builtin.set_fact:
        forgejo_admin_password: "{{ lookup('password', '/dev/null length=16 chars=hexdigits') }}"
        postgres_password: "{{ lookup('password', '/dev/null length=32 chars=hexdigits') }}"
        jwt_secret: "{{ lookup('password', '/dev/null length=32 chars=hexdigits') }}"
      when: not existing_passwords.stat.exists
      delegate_to: localhost

    - name: "OpenClaw Docker-Verzeichnis sicherstellen"
      ansible.builtin.file:
        path: "{{ docker_compose_dir }}/docker/openclaw"
        state: directory
        mode: '0755'

    - name: "OpenClaw Dockerfile deployen"
      ansible.builtin.copy:
        content: |
          FROM node:22-slim
          RUN apt-get update && apt-get install -y \
              git curl xvfb procps ssh \
              && rm -rf /var/lib/apt/lists/*
          RUN git config --global user.name "Factory Junior" && \
              git config --global user.email "junior@factory.local"
          WORKDIR /app
          COPY start-with-xvfb.sh /start-with-xvfb.sh
          RUN chmod +x /start-with-xvfb.sh
          ENTRYPOINT ["/start-with-xvfb.sh"]
        dest: "{{ docker_compose_dir }}/docker/openclaw/Dockerfile"

    - name: "start-with-xvfb.sh deployen"
      ansible.builtin.copy:
        content: |
          #!/bin/bash
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 1
          exec tail -f /dev/null
        dest: "{{ docker_compose_dir }}/docker/openclaw/start-with-xvfb.sh"
        mode: '0755'

    - name: "docker-compose.yml deployen"
      ansible.builtin.template:
        src: ../templates/docker-compose.yml.j2
        dest: "{{ docker_compose_dir }}/docker-compose.yml"

    - name: "Passwörter für spätere Phasen speichern"
      ansible.builtin.copy:
        content: |
          forgejo_admin_password={{ forgejo_admin_password }}
          postgres_password={{ postgres_password }}
          jwt_secret={{ jwt_secret }}
        dest: /output/.factory-passwords.env
        mode: '0600'
      delegate_to: localhost

  roles:
    - base
    - caddy
    - gateway

  post_tasks:
    - name: "Docker Stack starten"
      ansible.builtin.shell: |
        cd {{ docker_compose_dir }} && docker compose up -d --build 2>&1
      register: compose_result

    - name: "Docker-Compose Output"
      ansible.builtin.debug:
        msg: "{{ compose_result.stdout_lines[-5:] }}"

    - name: "Warte auf Docker-Services (30s)"
      ansible.builtin.pause:
        seconds: 30

- name: "Phase 3: Services konfigurieren"
  hosts: factory-prod
  gather_facts: false
  vars:
    forgejo_admin_password: "{{ lookup('ini', 'forgejo_admin_password type=properties file=/output/.factory-passwords.env') }}"
    postgres_password: "{{ lookup('ini', 'postgres_password type=properties file=/output/.factory-passwords.env') }}"
    jwt_secret: "{{ lookup('ini', 'jwt_secret type=properties file=/output/.factory-passwords.env') }}"
  roles:
    - postgres
    - forgejo
    - runner
    - tauri-build
    - openclaw
    - repos
    - secrets
    - poller

- name: "Phase 4: Smoke-Test"
  hosts: factory-prod
  gather_facts: false
  roles:
    - smoke-test

- name: "Phase 4b: Nacht-Stopp Timer"
  hosts: factory-prod
  gather_facts: false
  roles:
    - nightstop

- name: "Phase 5: Infra nach Forgejo pushen"
  hosts: factory-prod
  gather_facts: false
  tags: [push-infra]
  vars:
    forgejo_admin_password: "{{ lookup('ini', 'forgejo_admin_password type=properties file=/output/.factory-passwords.env') }}"
    forgejo_api_token: "{{ lookup('ini', 'FORGEJO_API_TOKEN type=properties file=/output/.tokens-env') }}"
  roles:
    - push-infra
