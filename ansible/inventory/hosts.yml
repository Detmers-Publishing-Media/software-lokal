---
# ACHTUNG: IPs aendern sich bei jeder Neuinstallation.
# Playbooks verwenden add_host mit dynamischer IP-Aufloesung.
# Diese Datei ist Fallback fuer ansible-lint und Doku.
# Aktuelle IPs: KeePass Runtime/server-env + Runtime/portal-env
all:
  children:
    prod:
      hosts:
        factory-prod:
          ansible_host: "0.0.0.0"
          ansible_user: root
          ansible_ssh_private_key_file: "~/.ssh/codefabrik_deploy"
    portal:
      hosts:
        factory-portal:
          ansible_host: "0.0.0.0"
          ansible_user: root
          ansible_ssh_private_key_file: "~/.ssh/codefabrik_deploy"
