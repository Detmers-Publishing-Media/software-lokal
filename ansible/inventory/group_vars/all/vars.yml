---
# Server
upcloud_zone: de-fra1
upcloud_plan: DEV-2xCPU-4GB
upcloud_os_storage: 25
upcloud_storage_tier: hdd
upcloud_os_template: 01000000-0000-4000-8000-000030240200  # Ubuntu 24.04

# DNS
cloudflare_zone: detmers-publish.de
cloudflare_zone_id: b9525ee2fa8f0e14ce58b1f1b184c597
# Subdomains (Single Source of Truth)
forgejo_subdomain: git
gateway_subdomain: gateway

dns_records:
  - { name: "{{ forgejo_subdomain }}", target: "{{ server_ip }}", proxied: true }
  - { name: "{{ gateway_subdomain }}", target: "{{ server_ip }}", proxied: true }

# Forgejo
forgejo_domain: "{{ forgejo_subdomain }}.{{ cloudflare_zone }}"
forgejo_image: "codeberg.org/forgejo/forgejo:10"

# Docker
docker_compose_dir: /opt/codefabrik

# Factory
factory_version: "0.6.3"
factory_org: factory
process_repo: process-repo
product_repo: factory-gateway

# SSH
ssh_key_path: "/root/.ssh/codefabrik_deploy"
ci_deploy_key_path: "/root/.ssh/portal_deploy_ci"

# Portal
portal_domain: "portal.detmers-publish.de"
portal_upcloud_plan: "DEV-1xCPU-1GB"
portal_upcloud_os_storage: 25
portal_docker_compose_dir: /opt/portal
portal_downloads_storage_title: "portal-downloads"
portal_downloads_storage_size: 50
portal_downloads_mount: /mnt/downloads
