<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature-Request - Detmers Publishing &amp; Media</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="/">Detmers Publishing &amp; Media</a></h1>
      <nav>
        <a href="/support">Support</a>
        <a href="/ideas">Ideen</a>
        <a href="/request">Anforderung</a>
        <a href="/status">Status</a>
      </nav>
    </div>
  </header>
  <div class="container">
    <div id="detail-view" style="display:none">
      <h2>Request-Status</h2>
      <div class="card" id="requestDetail"></div>
    </div>
    <div id="form-view">
      <h2>Feature-Anforderung</h2>
      <div class="card">
        <form id="requestForm">
          <label for="license_key">Lizenzkey</label>
          <input type="text" id="license_key" required placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
          <label for="title">Titel</label>
          <input type="text" id="title" required>
          <label for="description">Beschreibung</label>
          <textarea id="description" required placeholder="Beschreiben Sie das gewuenschte Feature..."></textarea>
          <label for="priority">Prioritaet</label>
          <select id="priority">
            <option value="normal">Normal</option>
            <option value="low">Niedrig</option>
            <option value="high">Hoch</option>
          </select>
          <button type="submit" class="btn">Absenden</button>
        </form>
      </div>
      <div id="error" class="error" style="display:none"></div>
      <div id="result" class="success" style="display:none"></div>
      <h3 style="margin-top:2rem">Meine Anforderungen</h3>
      <p style="margin-bottom:0.5rem;font-size:0.9rem;color:#666">Lizenzkey oben eingeben, dann:</p>
      <button class="btn btn-secondary" onclick="loadRequests()">Anforderungen laden</button>
      <div id="requests" style="margin-top:1rem"></div>
    </div>
  </div>
  <footer>Detmers Publishing &amp; Media</footer>
  <script>
    const path = location.pathname.split('/');
    if (path.length > 2 && path[2]) {
      document.getElementById('form-view').style.display = 'none';
      document.getElementById('detail-view').style.display = 'block';
      const params = new URLSearchParams(location.search);
      const key = params.get('key');
      if (key) {
        fetch(`/api/requests/${path[2]}?key=${key}`).then(r => r.json()).then(r => {
          if (r.error) { document.getElementById('requestDetail').innerHTML = `<p class="error">${esc(r.error)}</p>`; return; }
          document.getElementById('requestDetail').innerHTML = `
            <h3>${esc(r.request_number)}: ${esc(r.title)}</h3>
            <p>Status: <span class="badge ${r.status === 'released' ? 'badge-green' : 'badge-yellow'}">${esc(r.status)}</span></p>
            <p>Prioritaet: ${esc(r.priority)}</p>
            ${r.pipeline_object_id ? `<p>Pipeline: ${esc(r.pipeline_object_id)}</p>` : ''}
            ${r.target_version ? `<p>Ziel-Version: ${esc(r.target_version)}</p>` : ''}
            <p style="margin-top:0.5rem;font-size:0.85rem;color:#888">Erstellt: ${new Date(r.created_at).toLocaleString('de')}</p>
          `;
        });
      } else {
        document.getElementById('requestDetail').innerHTML = '<p>Bitte key= Parameter angeben.</p>';
      }
    }

    document.getElementById('requestForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('error');
      const resEl = document.getElementById('result');
      errEl.style.display = 'none'; resEl.style.display = 'none';
      try {
        const res = await fetch('/api/requests', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            license_key: document.getElementById('license_key').value,
            title: document.getElementById('title').value,
            description: document.getElementById('description').value,
            priority: document.getElementById('priority').value
          })
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error; errEl.style.display = 'block'; return; }
        resEl.innerHTML = `Anforderung <strong>${esc(data.request_number)}</strong> erstellt. Status: ${esc(data.status)}`;
        resEl.style.display = 'block';
      } catch (err) { errEl.textContent = err.message; errEl.style.display = 'block'; }
    });

    async function loadRequests() {
      const key = document.getElementById('license_key').value;
      if (!key) return;
      const res = await fetch(`/api/requests?key=${key}`);
      const reqs = await res.json();
      const el = document.getElementById('requests');
      if (reqs.error) { el.innerHTML = `<p class="error">${esc(reqs.error)}</p>`; return; }
      if (!reqs.length) { el.innerHTML = '<p>Keine Anforderungen gefunden.</p>'; return; }
      el.innerHTML = reqs.map(r => `
        <div class="card">
          <h3><a href="/request/${esc(r.request_number)}?key=${key}">${esc(r.request_number)}</a>: ${esc(r.title)}</h3>
          <p><span class="badge ${r.status === 'released' ? 'badge-green' : 'badge-yellow'}">${esc(r.status)}</span> ${esc(r.priority)}</p>
        </div>
      `).join('');
    }

    function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  </script>
</body>
</html>
