<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaufen - Code-Fabrik</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="/">Code-Fabrik</a></h1>
      <nav>
        <a href="/support">Support</a>
        <a href="/ideas">Ideen</a>
        <a href="/request">Anforderung</a>
        <a href="/status">Status</a>
      </nav>
    </div>
  </header>
  <div class="container">
    <div id="form-view">
      <h2 id="title">Produkt erwerben</h2>
      <div class="card">
        <form id="buyForm">
          <input type="hidden" id="product_id">
          <label for="customer_email">E-Mail</label>
          <input type="email" id="customer_email" required>
          <label for="customer_name">Name (optional)</label>
          <input type="text" id="customer_name">
          <button type="submit" class="btn">Kaufen</button>
        </form>
      </div>
      <div id="error" class="error" style="display:none"></div>
    </div>
    <div id="result" style="display:none">
      <h2>Kauf erfolgreich</h2>
      <div class="success">
        <p><strong>Lizenzkey:</strong> <code id="licenseKey"></code></p>
        <p style="margin-top:0.5rem"><a id="downloadLink" href="#" class="btn">Download</a></p>
      </div>
      <p>Bitte bewahren Sie Ihren Lizenzkey sicher auf. Sie benoetigen ihn fuer Support und Updates.</p>
    </div>
  </div>
  <footer>Code-Fabrik v0.4.1</footer>
  <script>
    const productId = location.pathname.split('/')[2];
    document.getElementById('product_id').value = productId;

    fetch(`/api/products/${productId}`).then(r => r.json()).then(p => {
      document.getElementById('title').textContent = `${p.name} erwerben`;
    }).catch(() => {});

    if (location.pathname.includes('/success')) {
      const params = new URLSearchParams(location.search);
      if (params.get('key')) {
        document.getElementById('form-view').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('licenseKey').textContent = params.get('key');
        document.getElementById('downloadLink').href = `/api/download/${productId}?key=${params.get('key')}`;
      }
    }

    document.getElementById('buyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('error');
      errEl.style.display = 'none';
      try {
        const res = await fetch('/api/buy', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            product_id: document.getElementById('product_id').value,
            customer_email: document.getElementById('customer_email').value,
            customer_name: document.getElementById('customer_name').value || undefined
          })
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error; errEl.style.display = 'block'; return; }
        location.href = `/buy/${productId}/success?key=${data.license_key}`;
      } catch (err) {
        errEl.textContent = err.message; errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
