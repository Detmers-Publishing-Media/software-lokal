# Native Mobile App — MVP (eigenständig nutzbar)

id: "FEAT-018"
title: "Native Mobile App für Nachweis Lokal (React Native / Expo)"
epic: "NACHWEIS-MOBILE"
status: "inbox"
priority: 1

story_type: "platform-core"
lane: "slow"
platform_impact: "high"
founder_gate_required: true
force_approve_allowed: false
auto_merge_allowed: false

platform_rationale: |
  Prüfungen finden vor Ort statt, nicht am Schreibtisch.
  PWA über lokalen HTTP-Server gescheitert (Browser-Sicherheit).
  Native App nötig — muss eigenständig nutzbar sein (Apple Guideline 4.2).

reused_by_products: ["nachweis-lokal"]

non_goals:
  - "Kein Companion — eigenständig nutzbar ohne Desktop"
  - "Keine Cloud-Synchronisation in v1"
  - "Kein KI-Assistent mit LLM in v1"
  - "Keine Teamfunktionen"

description: |
  Eigenständige Mobile App (Android + iOS) unter proprietärer Lizenz.
  Kostenlose Basisversion im App Store.

  === MVP (v0.9.0) — Kostenlos, eigenständig ===

  Technologie: React Native + Expo, expo-sqlite, expo-camera
  Lizenz: Proprietär (eigene Codebase, kein GPL)

  Onboarding:
  1. Sprache wählen (DE + TR/EN Untertitel)
  2. Betrieb beschreiben → Keyword-Classifier → passende Basis-Vorlagen
  3. Demo-Prüfung (5 Punkte)
  4. Eigene Checkliste erstellen oder Vorlage verwenden

  Features:
  - Eigene Checklisten erstellen (unbegrenzt)
  - 5 Basis-Vorlagen (CC-BY-SA)
  - Prüfung durchführen (OK/Mängel/Entfällt, Fotos, Mängel-Text)
  - Raum/Gerät inline anlegen
  - Punkte anpassbar beim ersten Einsatz
  - Ergebnisse lokal speichern (SQLite)
  - Prüfungshistorie
  - PDF-Export (einfach, ohne Briefkopf — Ergebnisliste mit Datum/Prüfer/Status)
  - Fälligkeits-Erinnerung (Push Notification)
  - Offline-fähig
  - Mehrsprachig (DE + TR/EN)

  Nicht in v1: Desktop-Sync, Business-Vorlagen, KI-LLM, Hash-Kette

  === Freemium-Grenze (kostenlos vs. bezahlt) ===

  Kostenlos: Funktional vollständig — prüfen, dokumentieren, einfaches PDF
  Bezahlt: Professionell — Briefkopf, QR-Code, Fotos im PDF, Business-Vorlagen

  === v2 (In-App-Kauf, 19,99 EUR einmalig) ===

  - PDF mit Briefkopf, QR-Code und eingebetteten Fotos
  - Organisationsprofil (Briefkopf-Daten)
  - 31+ Business-Vorlagen
  - Desktop-Sync (WLAN-Import/Export)
  - KI-Assistent
  - Hash-Kette (tamper-evident-log)

  === App Store ===

  - Kostenlos in Play Store + App Store
  - Eigenständig nutzbar (Apple 4.2 konform)
  - Kein Lizenzkey, kein externer Kauflink
  - In-App-Kauf v2 über Apple/Google Billing (15% Provision)
  - Demo-Modus für Reviewer

  === Screens ===

  1. Dashboard (Fälligkeiten, letzte Prüfungen, + Neue Prüfung)
  2. Checklisten (5 Basis + eigene + Business-Preview)
  3. Neue Prüfung (Checkliste + Raum/Gerät + Prüfer)
  4. Prüfung durchführen (Fortschritt, Touch-Buttons, Fotos)
  5. Prüfungsdetail (Ergebnisse, Fotos)
  6. Einstellungen (Sprache)

  === Architektur ===

  Neues Repo: nachweis-lokal-mobile/ (proprietär)
  - app/ (Expo Router)
  - components/ (ChecklistItem, PhotoCapture, ProgressBar)
  - lib/ (db.ts, i18n.ts, classifier.ts)
  - assets/ (template-library.json, business-catalog.json)

