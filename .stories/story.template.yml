lane: ""
# Erlaubte Werte:
#   fast   — Auto-Merge moeglich, Force-Approve erlaubt, KI-Review reicht
#   slow   — Kein Auto-Merge, kein Force-Approve, Founder Gate Pflicht

platform_impact: "none"
