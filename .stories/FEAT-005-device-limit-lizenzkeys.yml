id: "FEAT-005"
title: "Instance-Limit fuer Lizenzkeys + verifizierbare Trial-Keys"
epic: "LIZENZ-LIFECYCLE"
status: "refined"
priority: "P0-pre-prod"

story_type: "platform-core"
lane: "slow"
platform_impact: "high"
founder_gate_required: true
force_approve_allowed: false
auto_merge_allowed: false

platform_rationale: "Aendert Lizenz-Validierung in electron-platform und Portal — betrifft alle Produkte"
reused_by_products: ["mitglieder-lokal", "rechnung-lokal", "finanz-rechner", "nachweis-lokal", "berater-lokal"]
non_goals:
  - "Hardware-Fingerprinting (zu invasiv, DSGVO-kritisch)"
  - "Online-Pflicht (Offline-Modus muss weiter funktionieren)"
  - "Self-Service 'Geraet entfernen' UI (Auto-Bereinigung reicht)"
  - "Device-Management-Portal fuer Endkunden"

description: |
  Zwei zusammenhaengende Anforderungen:

  **1. Instance-Limit (Weitergabe-Schutz)**
  Aktuell kann ein Lizenzkey auf beliebig vielen Geraeten gleichzeitig
  genutzt werden. Das ermoeglicht unkontrollierte Weitergabe.

  Loesung: Jede App-Installation generiert beim ersten Start eine zufaellige
  Instance-ID (UUID), gespeichert in license.json. Bei jeder Online-Validierung
  wird die Instance-ID mitgeschickt. Portal trackt Instance-IDs pro Key
  (JSONB-Array in metadata oder eigene Tabelle) und lehnt ab, wenn das Limit
  ueberschritten wird.

  Limits:
  - Trial-Keys (CFTx): max. 3 Instanzen
  - Produktions-Keys (CFxx): max. 3 Instanzen

  Auto-Bereinigung: Instance-IDs die sich >90 Tage nicht gemeldet haben
  (keine Revalidierung), werden automatisch entfernt. Damit loest sich
  das "neuer Rechner"-Problem von selbst ohne Kunden-Aktion.

  Kein "Geraet entfernen"-UI, kein Self-Service. Falls ein Kunde wirklich
  am Limit ist: Support-Ticket → Admin entfernt manuell eine Instance-ID.

  **2. Verifizierbare Trial-Keys (30-Tage-Probe)**
  Trial-Keys (CFTx-Prefix) muessen im Portal registriert sein mit
  expires_at = NOW() + 30 Tage. Damit:
  - Support-Tickets funktionieren (validateByHash findet den Key)
  - Portal kann Restlaufzeit pruefen
  - Keine Geraete-Beschraenkung als Limitierung, 30 Tage reicht

  Desktop fordert bei Erststart (kein Key vorhanden) automatisch einen
  Trial-Key vom Portal an: POST /api/license/trial (kein Auth noetig).

  Aenderungen:
  - Portal: Instance-Tracking in license_instances Tabelle oder licenses.metadata
  - Portal: /api/license/validate prueft Instance-Count, registriert Instance
  - Portal: POST /api/license/trial — oeffentlicher Endpoint, erzeugt 30-Tage-Key
  - Portal: Auto-Bereinigung inaktiver Instances (>90 Tage) bei Validierung
  - electron-platform: Instance-ID generieren + bei Validierung mitsenden
  - electron-platform: Auto-Trial-Request bei Erststart
  - Portal: Admin-API zum manuellen Entfernen einer Instance-ID

