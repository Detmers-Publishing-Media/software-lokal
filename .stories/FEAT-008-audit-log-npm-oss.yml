description: |
  Extraktion der HMAC-SHA256 Hash-Ketten-Logik aus finanz-shared/models/events.js
  als eigenstaendiges, framework-agnostisches npm-Paket.

  Ziel: Internationales Open-Source-Paket fuer Entwickler die SOC2, NIS2 (seit Dez 2025
  in Kraft in DE, ~29.500 betroffene Unternehmen), ISO 27001 oder GDPR Compliance
  brauchen.

  Marktrecherche (Maerz 2026):
  - Paketname "audit-chain" auf npm VERFUEGBAR (geprueft)
  - Kein aktiver npm-Wettbewerber mit Tamper-Proof + Zero Dependencies + framework-agnostisch
  - ri-event-log (Feb 2026) einziger Konkurrent, aber Dexie/IndexedDB-gebunden (nur Browser)
  - 6 Hacker-News-Posts zeigen wiederkehrende Nachfrage ohne npm-Loesung
  - Grosse Projekte (immudb, Google Trillian) sind Go-basiert — Node.js-Welt ist leer
  - SaaS-Wettbewerber (Pangea, Logsync) sind Cloud-only
  - GoBD wurde Jul 2025 verschaerft: manipulationssichere Zeitstempel Pflicht

  Strategischer Zweck: Primaer Vertrauensanker fuer Code-Fabrik-Produkte.
  Sekundaer eigenstaendiges Open-Source-Paket.

  Strategie: Open Core
  - Free (MIT): Hash-Kette, Verifizierung, Event-Replay, Storage-Adapter-Interface
  - Pro ($29 one-time, spaeter bei Nachfrage): Compliance-Reports, Multi-Chain, Encrypted Payloads

  WICHTIG: Der Name "tamperproof-log" ist veraltet und darf NICHT mehr verwendet
  werden. Korrekter Name: audit-chain. Scope: @detmerspublishing. GitHub: detmerspublish.

  Sprache: Englisch (Code, Docs, README, API)
  Repo: Eigenes GitHub-Repo (public), NICHT im code-fabrik Monorepo
  Paketname: audit-chain (npm-Verfuegbarkeit bestaetigt)

  Was schon existiert (70% wiederverwendbar):
  - HMAC-SHA256 Hash-Kette (packages/finanz-shared/src/models/events.js)
  - Integritaetspruefung (Kette verifizieren, Manipulation erkennen)
  - Event-Replay (Zustand aus Events rekonstruieren)
  - Tests (Ketten, Replay, Integritaet)

  Was neu gebaut werden muss:
  - Framework-agnostischer Core (kein SQLite/better-sqlite3 Dependency)
  - Storage-Adapter-Interface (InMemory, SQLite, Postgres, Custom)
  - TypeScript Declarations (.d.ts)
  - Englische API-Oberflaeche
  - README mit Badges, Beispielen, API-Docs
  - 3 Beispiele (Node.js, Express Middleware, CLI)
  - GitHub Actions CI (Test + npm publish)
  - npm publish Setup

  Dokumentation:
  - docs/konzept/audit-log-npm-business-review.md (Business Review)
  - docs/konzept/audit-log-npm-marktrecherche.md (Vertiefte Marktrecherche)
  - docs/konzept/audit-log-npm-bewertung.md (Strategische Bewertung)

