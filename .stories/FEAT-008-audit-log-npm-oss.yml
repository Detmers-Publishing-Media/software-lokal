platform_rationale: "Eigenstaendiges npm-Paket auf GitHub (public) — kein Einfluss auf bestehende Produkte"
reused_by_products: []
non_goals:
  - "Aenderung an finanz-shared oder bestehenden Produkten"
  - "Monetarisierung in Phase 1 (erst Adoption, dann Pro-Features)"
