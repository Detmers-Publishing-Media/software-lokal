  - "Framework-spezifische Adapter (SQLite, Postgres) im Core"

description: |
  Extraktion der HMAC-SHA256 Hash-Ketten-Logik aus finanz-shared/models/events.js
  als eigenstaendiges, framework-agnostisches npm-Paket.

  Ziel: Internationales Open-Source-Paket fuer Entwickler die SOC2, NIS2 (EU-Deadline
  Juni 2026), ISO 27001 oder GDPR Compliance brauchen. Kein brauchbarer Wettbewerber
  auf npm (alle tot oder framework-gebunden).

  Strategie: Open Core
  - Free (MIT): Hash-Kette, Verifizierung, Event-Replay, Storage-Adapter-Interface
  - Pro ($29 one-time, spaeter): Compliance-Reports, Multi-Chain, Encrypted Payloads

  Sprache: Englisch (Code, Docs, README, API)
  Repo: Eigenes GitHub-Repo (public), NICHT im code-fabrik Monorepo
  Paketname: z.B. @detmers/audit-log oder tamperproof-log (npm-Verfuegbarkeit pruefen)

  Was schon existiert (70% wiederverwendbar):
  - HMAC-SHA256 Hash-Kette (packages/finanz-shared/src/models/events.js)
  - Integritaetspruefung (Kette verifizieren, Manipulation erkennen)
  - Event-Replay (Zustand aus Events rekonstruieren)
  - Tests (Ketten, Replay, Integritaet)

  Was neu gebaut werden muss:
  - Framework-agnostischer Core (kein SQLite/better-sqlite3 Dependency)
  - Storage-Adapter-Interface (InMemory, SQLite, Postgres, Custom)
  - TypeScript Declarations (.d.ts)
  - Englische API-Oberflaeche
  - README mit Badges, Beispielen, API-Docs
  - 3 Beispiele (Node.js, Express Middleware, CLI)
  - GitHub Actions CI (Test + npm publish)
  - npm publish Setup

acceptance_criteria:
  - "Eigenes GitHub-Repo (public) mit MIT-Lizenz"
  - "npm-Paket veroeffentlicht und installierbar"
  - "Zero Dependencies im Core"
  - "Storage-Adapter-Interface (InMemory-Adapter mitgeliefert)"
  - "TypeScript Declarations"
  - "README: Badges, Install, Quick Start, API, 3 Beispiele"
  - "HMAC-SHA256 Hash-Kette mit Verifizierung"
  - "Event-Replay aus Hash-Kette"
  - "Tamper-Detection (manipulierte Events erkennen)"
  - "100% Test-Coverage fuer Core"
  - "GitHub Actions: Test + npm publish on tag"
  - "Kein Code aus finanz-shared direkt kopiert (Clean-Room-Extraktion)"
  - "Englisch: Code, Docs, README, API, Commit Messages"

