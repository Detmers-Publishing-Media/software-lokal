description: |
  Nach dem Abschließen einer Prüfung wird der Nutzer kommentarlos
  zur Detailansicht weitergeleitet. Es fehlt eine positive
  Bestätigung dass die Prüfung gespeichert wurde.

  Umsetzung:
  - Nach Klick auf "Abschließen": kurze Erfolgsmeldung anzeigen
  - "Prüfung abgeschlossen und gespeichert!"
  - Wenn wiederkehrend: "Nächste Prüfung in X Tagen angelegt."
  - Nach 3 Sekunden automatisch zur Detailansicht

  Motivation: Positive Verstärkung. Der Nutzer fühlt sich
  bestätigt dass er etwas Gutes getan hat.

