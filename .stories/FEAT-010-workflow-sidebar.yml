description: |
  Die Sidebar wird von 12 flachen Eintraegen auf 7 workflow-orientierte
  Eintraege mit Gruppenheadern reduziert:
  - Dashboard (Einstieg)
  - VORBEREITEN: Vorlagen, Objekte
  - PRUEFEN: Pruefungen
  - NACHVERFOLGEN: Maengel
  - Einstellungen (Profil, Pruefer, Integritaet, Supportvertrag)
  - Support (Tickets, Ideen, Changelog)

  Bibliothek und Import werden Tabs in der Vorlagen-Seite.
  Integritaet wird Tab in den Einstellungen.
  Ideen und Changelog werden Tabs in der Support-Seite.

